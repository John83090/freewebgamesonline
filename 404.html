.glitch{
  font-size:7rem;font-weight:900;line-height:1;
  background:linear-gradient(135deg,#a78bfa,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  position:relative;user-select:none;
}
@keyframes glitch1{
  0%,94%,100%{clip-path:inset(0 0 100% 0);transform:translate(0)}
  95%{clip-path:inset(20% 0 60% 0);transform:translate(-4px,0);-webkit-text-fill-color:#f0abfc}
  97%{clip-path:inset(50% 0 20% 0);transform:translate(4px,0);-webkit-text-fill-color:#818cf8}
}
.glitch::after{
  content:'404';position:absolute;inset:0;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background:linear-gradient(135deg,#f0abfc,#818cf8);
  animation:glitch1 3s infinite;pointer-events:none;
}

}
.btn-home:hover{background:#9d5cff;transform:translateY(-2px)}
.btn-sec{

.game-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}

  text-decoration:none;transition:all .15s;
}
.chip:hover{background:#2d2f52;color:#fff;border-color:#7c3aed}
