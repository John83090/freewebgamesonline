<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Math Crossword – FreeWebGamesOnline</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<style>
:root{--bg:#0d0d14;--bg2:#13131f;--card:#1e1e30;--border:#2a2a45;--accent:#6c63ff;--text:#e8e8f0;--text2:#9898b8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
.back{color:var(--text2);text-decoration:none;font-size:1.3rem}
.title{font-weight:800;font-size:1.1rem;flex:1}
.score-badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:0.85rem;font-weight:700;color:var(--accent)}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:16px}
#grid-wrap{display:inline-grid;gap:2px;background:var(--border);border:2px solid var(--border);border-radius:8px;overflow:hidden}
.cell{width:44px;height:44px;background:var(--card);position:relative;display:flex;align-items:center;justify-content:center}
.cell.black{background:#050508}
.cell input{width:100%;height:100%;background:transparent;border:none;outline:none;text-align:center;font-size:1.1rem;font-weight:700;color:var(--text);text-transform:uppercase;padding:0}
.cell input:focus{background:rgba(108,99,255,0.15)}
.cell input.correct{color:#22c55e}
.cell input.wrong{color:#ef4444}
.cell-num{position:absolute;top:2px;left:3px;font-size:0.6rem;color:var(--accent);font-weight:700;line-height:1;pointer-events:none}
#clues{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:500px}
.clue-section h3{font-size:0.85rem;font-weight:800;color:var(--accent);margin-bottom:8px;text-transform:uppercase}
.clue-item{font-size:0.82rem;color:var(--text2);margin-bottom:5px;cursor:pointer;padding:3px 6px;border-radius:4px}
.clue-item:hover{background:var(--card);color:var(--text)}
.clue-item.done{color:#22c55e;text-decoration:line-through}
#buttons{display:flex;gap:10px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:0.9rem;font-weight:700;cursor:pointer}
.btn:hover{background:#8b7cf6}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn.outline:hover{border-color:var(--accent);color:var(--text)}
#msg{font-size:0.95rem;font-weight:600;min-height:22px;color:var(--text2)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:50;align-items:center;justify-content:center}
#overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;max-width:320px;width:90%}
.modal h2{font-size:1.6rem;margin-bottom:8px}
.modal p{color:var(--text2);margin-bottom:20px}
</style>
</head>
<body>
<header>
  <a class="back" href="../index.html">←</a>
  <span class="title">➕ Math Crossword</span>
  <span class="score-badge" id="score-disp">Score: 0</span>
</header>
<main>
  <div id="grid-wrap"></div>
  <div id="clues">
    <div class="clue-section"><h3>→ Across</h3><div id="across-clues"></div></div>
    <div class="clue-section"><h3>↓ Down</h3><div id="down-clues"></div></div>
  </div>
  <div id="msg"></div>
  <div id="buttons">
    <button class="btn" onclick="checkAnswers()">Check</button>
    <button class="btn outline" onclick="revealOne()">Hint</button>
    <button class="btn outline" onclick="newGame()">New Puzzle</button>
  </div>
</main>
<div id="overlay">
  <div class="modal">
    <h2>🎉 Puzzle Solved!</h2>
    <p id="modal-body"></p>
    <button class="btn" onclick="newGame();document.getElementById('overlay').classList.remove('show')">New Puzzle</button>
  </div>
</div>
<script>
// Puzzle definitions (5x5 grids)
// Each puzzle: grid layout (# = black), across clues, down clues
// Answers are numbers, clues are math equations

const PUZZLES=[
  {
    // Puzzle 1
    size:5,
    // 0-indexed row,col
    blacks:[[1,2],[3,2]],
    across:[
      {num:1,row:0,col:0,len:5,clue:'3×5 + 4×5 − 10 =',ans:'25'},
      {num:3,row:2,col:0,len:2,clue:'4² − 9 =',ans:'7'},
      {num:4,row:2,col:3,len:2,clue:'6 + 8 − 2 =',ans:'12'},
      {num:5,row:4,col:0,len:5,clue:'8² − 3 =',ans:'61'},
    ],
    down:[
      {num:1,row:0,col:0,len:2,clue:'5² =',ans:'25'},
      {num:2,row:0,col:2,len:2,clue:'3 + 2 =',ans:'5'},
      {num:3,row:2,col:0,len:3,clue:'7×3 + 6 =',ans:'27'},
      {num:6,row:2,col:4,len:3,clue:'5 + 8 − 2 + 1 =',ans:'12'},
    ]
  },
  {
    // Puzzle 2
    size:5,
    blacks:[[0,3],[2,1],[4,1]],
    across:[
      {num:1,row:0,col:0,len:3,clue:'12 × 4 =',ans:'48'},
      {num:2,row:0,col:4,len:1,clue:'2³ =',ans:'8'},
      {num:3,row:1,col:0,len:5,clue:'5×7 + 3×5 =',ans:'50'},
      {num:4,row:2,col:2,len:3,clue:'9 + 5×2 =',ans:'19'},
      {num:5,row:3,col:0,len:5,clue:'6×9 − 8 =',ans:'46'},
      {num:6,row:4,col:2,len:3,clue:'4³ + 2 =',ans:'66'},
    ],
    down:[
      {num:1,row:0,col:0,len:4,clue:'7 × 7 − 5 =',ans:'44'},
      {num:7,row:0,col:2,len:5,clue:'4×5 + 6×3 =',ans:'38'},
      {num:2,row:0,col:4,len:5,clue:'8+2×4+0 =',ans:'16'},
    ]
  },
];

let score=0,hints=0,puzzleIdx=0;
let cells={};  // "r,c" -> {input, correct}
let puzzle=null;

function newGame(){
  puzzleIdx=(puzzleIdx+1)%PUZZLES.length;
  buildPuzzle(PUZZLES[puzzleIdx]);
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('msg').textContent='';
}

function buildPuzzle(p){
  puzzle=p;
  cells={};
  const wrap=document.getElementById('grid-wrap');
  wrap.innerHTML='';
  wrap.style.gridTemplateColumns=`repeat(${p.size},44px)`;
  wrap.style.gridTemplateRows=`repeat(${p.size},44px)`;

  // Determine which cells are active and their numbers
  const numbered={};
  [...p.across,...p.down].forEach(e=>{numbered[e.row+','+e.col]=e.num;});

  for(let r=0;r<p.size;r++){
    for(let c=0;c<p.size;c++){
      const div=document.createElement('div');
      div.className='cell';
      const isBlack=p.blacks.some(b=>b[0]===r&&b[1]===c);
      if(isBlack){div.classList.add('black');}
      else{
        const inp=document.createElement('input');
        inp.type='text';inp.maxLength=1;
        inp.inputMode='numeric';
        inp.setAttribute('data-rc',r+','+c);
        div.appendChild(inp);
        const key=r+','+c;
        // Find answer character
        let ansChar='';
        [...p.across,...p.down].forEach(e=>{
          if(e.row===r&&e.col<=c&&c<e.col+e.len) ansChar=e.ans[c-e.col];
          if(e.col===c&&e.row<=r&&r<e.row+e.len) ansChar=e.ans[r-e.row];
        });
        cells[key]={input:inp, answer:ansChar};
        if(numbered[key]){
          const span=document.createElement('span');
          span.className='cell-num';
          span.textContent=numbered[key];
          div.appendChild(span);
        }
        inp.addEventListener('input',()=>{inp.value=inp.value.replace(/[^0-9]/g,'').slice(-1);});
        inp.addEventListener('keydown',e=>{
          if(e.key==='Backspace'&&!inp.value){const prev=findPrev(r,c);if(prev)prev.focus();}
          else if(e.key==='ArrowRight'){const next=document.querySelector(`[data-rc="${r},${c+1}"]`);if(next)next.focus();}
          else if(e.key==='ArrowLeft'){const next=document.querySelector(`[data-rc="${r},${c-1}"]`);if(next)next.focus();}
          else if(e.key==='ArrowDown'){const next=document.querySelector(`[data-rc="${r+1},${c}"]`);if(next)next.focus();}
          else if(e.key==='ArrowUp'){const next=document.querySelector(`[data-rc="${r-1},${c}"]`);if(next)next.focus();}
        });
        inp.addEventListener('input',()=>{if(inp.value){const next=findNext(r,c);if(next)next.focus();}});
      }
      wrap.appendChild(div);
    }
  }

  // Build clue lists
  function buildClueList(clues,elId){
    const el=document.getElementById(elId);
    el.innerHTML='';
    clues.forEach(e=>{
      const d=document.createElement('div');
      d.className='clue-item';
      d.id='clue-'+e.num+(elId.includes('across')?'A':'D');
      d.textContent=`${e.num}. ${e.clue}`;
      d.onclick=()=>{const inp=document.querySelector(`[data-rc="${e.row},${e.col}"]`);if(inp)inp.focus();};
      el.appendChild(d);
    });
  }
  buildClueList(p.across,'across-clues');
  buildClueList(p.down,'down-clues');
}

function findNext(r,c){
  const inp=document.querySelector(`[data-rc="${r},${c+1}"]`);
  return inp||document.querySelector(`[data-rc="${r},${c+2}"]`);
}
function findPrev(r,c){
  return document.querySelector(`[data-rc="${r},${c-1}"]`);
}

function checkAnswers(){
  let correct=0,total=0;
  Object.entries(cells).forEach(([key,{input,answer}])=>{
    if(answer){
      total++;
      input.classList.remove('correct','wrong');
      if(input.value===answer){correct++;input.classList.add('correct');}
      else if(input.value) input.classList.add('wrong');
    }
  });
  if(correct===total&&total>0){
    const pts=100-hints*10;
    score+=Math.max(10,pts);
    document.getElementById('score-disp').textContent='Score: '+score;
    document.getElementById('modal-body').textContent=`Score: ${score}\nHints used: ${hints}`;
    document.getElementById('overlay').classList.add('show');
  } else {
    document.getElementById('msg').textContent=`${correct}/${total} correct`;
  }
}

function revealOne(){
  const empties=Object.entries(cells).filter(([,{input,answer}])=>input.value!==answer&&answer);
  if(!empties.length)return;
  const [,[inp,ans]]=empties[Math.floor(Math.random()*empties.length)];
  const [{input,answer}]=empties.map(e=>e[1]).filter(v=>v.input);
  // Pick a random empty cell
  const {input:targetInp,answer:targetAns}=empties[Math.floor(Math.random()*empties.length)][1];
  targetInp.value=targetAns;
  targetInp.classList.add('correct');
  hints++;
  document.getElementById('msg').textContent=`Hints used: ${hints}`;
}

buildPuzzle(PUZZLES[0]);
</script>
</body>
</html>
