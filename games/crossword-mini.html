<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Crossword – FreeWebGamesOnline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
#topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 18px;display:flex;align-items:center;gap:14px}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}#topbar a:hover{color:#6c63ff}
#topbar h1{font-size:18px;flex:1}
#score-badge{background:#6c63ff;color:#fff;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700}
#main{display:flex;flex-wrap:wrap;justify-content:center;padding:16px;gap:20px}
#left{display:flex;flex-direction:column;gap:14px;align-items:center}
#grid-wrap{background:#1e1e30;border:1px solid #2a2a45;border-radius:10px;padding:10px}
#grid{display:grid;gap:2px}
.cell{width:46px;height:46px;background:#e8e8f0;border:1px solid #9898b8;position:relative;cursor:pointer}
.cell.black{background:#0d0d14;border-color:#0d0d14;cursor:default}
.cell.active{background:#d0d0ff;border-color:#6c63ff}
.cell.highlighted{background:#e8e8d0}
.cell.correct{background:#c8f0c8}
.cell.wrong{background:#f0c8c8}
.cell input{position:absolute;inset:0;width:100%;height:100%;border:none;background:transparent;text-align:center;font-size:20px;font-weight:700;color:#0d0d14;text-transform:uppercase;outline:none;cursor:pointer;caret-color:transparent}
.cell .num{position:absolute;top:2px;left:3px;font-size:9px;color:#6c63ff;font-weight:700;line-height:1}
#clues{display:flex;flex-direction:column;gap:16px;min-width:200px;max-width:280px}
.clue-section{background:#1e1e30;border:1px solid #2a2a45;border-radius:10px;padding:12px}
.clue-section h3{font-size:13px;color:#9898b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.clue{font-size:13px;padding:4px 6px;border-radius:5px;cursor:pointer;color:#9898b8}
.clue b{color:#e8e8f0}
.clue:hover{background:#2a2a45}
.clue.active{background:#2a2a45;color:#e8e8f0}
.clue.solved{color:#2ecc71}
#controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button.action{background:#6c63ff;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
button.action:hover{background:#574fd6}
button.sec{background:#1e1e30;border:1px solid #2a2a45;color:#9898b8;padding:9px 18px;border-radius:8px;font-size:14px;cursor:pointer}
button.sec:hover{border-color:#6c63ff;color:#6c63ff}
#stats{font-size:13px;color:#9898b8;text-align:center}
#message{font-size:16px;font-weight:700;min-height:24px;color:#6c63ff;text-align:center}
#puzzle-row{display:flex;gap:8px;justify-content:center}
.pz-btn{background:#1e1e30;border:1px solid #2a2a45;color:#9898b8;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer}
.pz-btn.active{border-color:#6c63ff;color:#6c63ff}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <h1>&#129534; Mini Crossword</h1>
  <span id="score-badge">0%</span>
</div>
<div id="main">
  <div id="left">
    <div id="puzzle-row"></div>
    <div id="stats">Time: <b id="timer">0:00</b></div>
    <div id="grid-wrap"><div id="grid"></div></div>
    <div id="message"></div>
    <div id="controls">
      <button class="action" onclick="checkAll()">Check</button>
      <button class="sec" onclick="revealAll()">Reveal</button>
      <button class="sec" onclick="clearAll()">Clear</button>
    </div>
  </div>
  <div id="clues">
    <div class="clue-section"><h3>Across</h3><div id="across-clues"></div></div>
    <div class="clue-section"><h3>Down</h3><div id="down-clues"></div></div>
  </div>
</div>
<script>
// Puzzle format: 5x5 grid, '#'=black, letter=answer, ' '=white cell
// Each puzzle: {grid (5x5 chars), across:[{num,r,c,clue}], down:[{num,r,c,clue}]}
const PUZZLES=[
{
  answer:['CRANE','LEMON','AMBER','MOVIE','PENNY'],
  blacks:[[1,3],[3,1],[0,4]],
  grid:['CR_NE','LEMON','AMB_R','_OVIE','PENNY'],
  across:[
    {num:1,r:0,c:0,len:4,clue:'Large bird or lifting machine'},
    {num:3,r:1,c:0,len:5,clue:'Yellow citrus fruit'},
    {num:5,r:2,c:0,len:4,clue:'Warm orange-yellow color'},
    {num:6,r:3,c:1,len:4,clue:'Film shown in a cinema'},
    {num:7,r:4,c:0,len:5,clue:'British copper coin'}
  ],
  down:[
    {num:1,r:0,c:0,len:5,clue:'Loud bang sound'},
    {num:2,r:0,c:1,len:5,clue:'Rodents, plural'},
    {num:3,r:1,c:2,len:4,clue:'Newborn bear'},
    {num:4,r:0,c:3,len:4,clue:'Opposite of beginning'},
    {num:5,r:2,c:4,len:3,clue:'Overhead, poetic'},
  ]
},
{
  answer:['PLANK','LINER','ANGEL','NEVER','KENYA'],
  blacks:[[1,4],[3,0],[0,2]],
  grid:['PL_NK','LINER','ANGEL','_EVER','KENYA'],
  across:[
    {num:1,r:0,c:0,len:2,clue:'Walk the ___'},
    {num:2,r:0,c:3,len:2,clue:'Opposite of loose'},
    {num:3,r:1,c:0,len:4,clue:'Ocean __; large ship'},
    {num:4,r:2,c:0,len:5,clue:'Heavenly messenger'},
    {num:5,r:3,c:1,len:4,clue:'Not ever'},
    {num:6,r:4,c:0,len:5,clue:'African country, capital Nairobi'}
  ],
  down:[
    {num:1,r:0,c:0,len:5,clue:'Large flat board'},
    {num:2,r:0,c:1,len:5,clue:'Relates to a body part (leg)'},
    {num:3,r:0,c:3,len:5,clue:'Midnight black shade'},
    {num:4,r:1,c:2,len:4,clue:'Relating to numbers'},
    {num:5,r:1,c:4,len:3,clue:'Opposite of yes (archaic)'}
  ]
},
{
  answer:['STORM','HONEY','OPERA','RIDER','MANGO'],
  blacks:[[1,2],[3,4],[0,3]],
  grid:['STO_M','HO_EY','OPERA','RIDER','MANGO'],
  across:[
    {num:1,r:0,c:0,len:3,clue:'Violent weather'},
    {num:2,r:0,c:4,len:1,clue:'Me, myself, and ___'},
    {num:3,r:1,c:0,len:2,clue:'Exclamation of surprise'},
    {num:4,r:1,c:3,len:2,clue:'Exclamation of surprise (alt)'},
    {num:5,r:2,c:0,len:5,clue:'Dramatic singing performance'},
    {num:6,r:3,c:0,len:5,clue:'Equestrian or bike user'},
    {num:7,r:4,c:0,len:5,clue:'Tropical stone fruit'}
  ],
  down:[
    {num:1,r:0,c:0,len:5,clue:'Hammer or anvil'},
    {num:2,r:0,c:1,len:5,clue:'Unkempt or disorderly'},
    {num:3,r:1,c:2,len:4,clue:'Elf or tiny fairy'},
    {num:4,r:0,c:4,len:5,clue:'Large freshwater fish'},
    {num:5,r:0,c:3,len:3,clue:'Preposition (about or regarding)'}
  ]
}
];

let puzzleIdx=0,cells=[],timerID=null,elapsed=0,activeDef=null,direction='across',checking=false;
const SIZE=5;

function loadPuzzle(idx){
  puzzleIdx=idx;
  const p=PUZZLES[idx];
  cells=Array.from({length:SIZE},()=>Array(SIZE).fill(null));
  clearInterval(timerID);elapsed=0;document.getElementById('timer').textContent='0:00';
  document.getElementById('message').textContent='';
  // Build cell model
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const letter=p.answer[r][c];
    const black=letter===' '||letter==='_';
    cells[r][c]={black,answer:black?null:letter,value:'',r,c};
  }
  // Assign numbers
  let num=1;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(cells[r][c].black)continue;
    const acrossStart=(c===0||cells[r][c-1].black)&&c+1<SIZE&&!cells[r][c+1].black;
    const downStart=(r===0||cells[r-1][c].black)&&r+1<SIZE&&!cells[r+1][c].black;
    if(acrossStart||downStart){cells[r][c].num=num++;} else cells[r][c].num=0;
  }
  timerID=setInterval(()=>{elapsed++;const m=Math.floor(elapsed/60),s=elapsed%60;document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;},1000);
  renderGrid();renderClues();
  document.querySelectorAll('.pz-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function renderGrid(){
  const el=document.getElementById('grid');
  el.style.gridTemplateColumns=`repeat(${SIZE},46px)`;
  el.innerHTML='';
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const cell=cells[r][c];
    const d=document.createElement('div');d.className='cell'+(cell.black?' black':'');
    if(!cell.black){
      if(cell.num){const n=document.createElement('div');n.className='num';n.textContent=cell.num;d.appendChild(n);}
      const inp=document.createElement('input');inp.maxLength=1;inp.value=cell.value||'';
      inp.dataset.r=r;inp.dataset.c=c;
      inp.addEventListener('click',()=>cellClick(r,c));
      inp.addEventListener('input',e=>cellInput(e,r,c));
      inp.addEventListener('keydown',e=>cellKeydown(e,r,c));
      d.appendChild(inp);
    }
    el.appendChild(d);
  }
}

function getInput(r,c){return document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);}

function cellClick(r,c){
  if(activeDef&&activeDef.includes(`${r},${c}`)){direction=direction==='across'?'down':'across';}
  activeDef=null;highlightDef(r,c);
}

function highlightDef(r,c){
  // Find which across/down definition this cell belongs to
  const p=PUZZLES[puzzleIdx];
  let defCells=[];
  if(direction==='across'){
    let sc=c;while(sc>0&&!cells[r][sc-1].black)sc--;
    for(let i=sc;i<SIZE&&!cells[r][i].black;i++)defCells.push(`${r},${i}`);
  } else {
    let sr=r;while(sr>0&&!cells[sr-1][c].black)sr--;
    for(let i=sr;i<SIZE&&!cells[i][c].black;i++)defCells.push(`${i},${c}`);
  }
  if(defCells.length<=1){direction=direction==='across'?'down':'across';
    if(direction==='across'){let sc=c;while(sc>0&&!cells[r][sc-1].black)sc--;defCells=[];for(let i=sc;i<SIZE&&!cells[r][i].black;i++)defCells.push(`${r},${i}`);}
    else{let sr=r;while(sr>0&&!cells[sr-1][c].black)sr--;defCells=[];for(let i=sr;i<SIZE&&!cells[i][c].black;i++)defCells.push(`${i},${c}`);}
  }
  activeDef=defCells;
  document.querySelectorAll('.cell:not(.black)').forEach(d=>d.classList.remove('active','highlighted'));
  defCells.forEach((key,i)=>{const [ro,co]=key.split(',').map(Number);const inp=getInput(ro,co);if(inp){inp.parentElement.classList.add(i===defCells.indexOf(`${r},${c}`)&&defCells[0]===`${r},${c}`?'active':'highlighted');}});
  const inp=getInput(r,c);if(inp){inp.parentElement.classList.remove('highlighted');inp.parentElement.classList.add('active');inp.focus();}
}

function cellInput(e,r,c){
  const val=e.target.value.toUpperCase().replace(/[^A-Z]/g,'');
  cells[r][c].value=val.slice(-1);e.target.value=cells[r][c].value;
  if(cells[r][c].value)moveNext(r,c);
  updateScore();
}

function cellKeydown(e,r,c){
  if(e.key==='Backspace'&&!cells[r][c].value){movePrev(r,c);e.preventDefault();}
  if(e.key==='ArrowRight'){e.preventDefault();if(c+1<SIZE&&!cells[r][c+1].black){direction='across';highlightDef(r,c+1);}}
  if(e.key==='ArrowLeft'){e.preventDefault();if(c-1>=0&&!cells[r][c-1].black){direction='across';highlightDef(r,c-1);}}
  if(e.key==='ArrowDown'){e.preventDefault();if(r+1<SIZE&&!cells[r+1][c].black){direction='down';highlightDef(r+1,c);}}
  if(e.key==='ArrowUp'){e.preventDefault();if(r-1>=0&&!cells[r-1][c].black){direction='down';highlightDef(r-1,c);}}
}

function moveNext(r,c){
  if(direction==='across'&&c+1<SIZE&&!cells[r][c+1].black)highlightDef(r,c+1);
  else if(direction==='down'&&r+1<SIZE&&!cells[r+1][c].black)highlightDef(r+1,c);
}

function movePrev(r,c){
  if(direction==='across'&&c-1>=0&&!cells[r][c-1].black){cells[r][c-1].value='';const inp=getInput(r,c-1);if(inp)inp.value='';highlightDef(r,c-1);}
  else if(direction==='down'&&r-1>=0&&!cells[r-1][c].black){cells[r-1][c].value='';const inp=getInput(r-1,c);if(inp)inp.value='';highlightDef(r-1,c);}
}

function updateScore(){
  let total=0,correct=0;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){if(!cells[r][c].black){total++;if(cells[r][c].value===cells[r][c].answer)correct++;}}
  const pct=total?Math.round(correct/total*100):0;
  document.getElementById('score-badge').textContent=pct+'%';
}

function checkAll(){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!cells[r][c].black){
      const inp=getInput(r,c);if(!inp)continue;
      if(!cells[r][c].value){inp.parentElement.classList.remove('correct','wrong');continue;}
      inp.parentElement.classList.toggle('correct',cells[r][c].value===cells[r][c].answer);
      inp.parentElement.classList.toggle('wrong',cells[r][c].value!==cells[r][c].answer);
    }
  }
  updateScore();
  let total=0,correct=0;
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){if(!cells[r][c].black){total++;if(cells[r][c].value===cells[r][c].answer)correct++;}}
  if(correct===total){clearInterval(timerID);document.getElementById('message').textContent='Puzzle complete! Well done!';}
}

function revealAll(){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!cells[r][c].black){cells[r][c].value=cells[r][c].answer;const inp=getInput(r,c);if(inp)inp.value=cells[r][c].answer;}
  }
  clearInterval(timerID);updateScore();
  document.getElementById('message').textContent='Puzzle revealed!';
}

function clearAll(){
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!cells[r][c].black){cells[r][c].value='';const inp=getInput(r,c);if(inp){inp.value='';inp.parentElement.classList.remove('correct','wrong');}}
  }
  document.getElementById('message').textContent='';updateScore();
}

function renderClues(){
  const p=PUZZLES[puzzleIdx];
  document.getElementById('across-clues').innerHTML=p.across.map(cl=>`<div class="clue" onclick="focusClue('across',${cl.r},${cl.c})"><b>${cl.num}.</b> ${cl.clue}</div>`).join('');
  document.getElementById('down-clues').innerHTML=p.down.map(cl=>`<div class="clue" onclick="focusClue('down',${cl.r},${cl.c})"><b>${cl.num}.</b> ${cl.clue}</div>`).join('');
}

function focusClue(dir,r,c){direction=dir;highlightDef(r,c);}

// Puzzle buttons
const pr=document.getElementById('puzzle-row');
PUZZLES.forEach((_,i)=>{const b=document.createElement('button');b.className='pz-btn';b.textContent='Puzzle '+(i+1);b.onclick=()=>loadPuzzle(i);pr.appendChild(b);});
loadPuzzle(0);
</script>
</body>
</html>
