<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sokoban – FreeWebGamesOnline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
#topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 18px;display:flex;align-items:center;gap:14px}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}#topbar a:hover{color:#6c63ff}
#topbar h1{font-size:18px;flex:1}
#score-badge{background:#6c63ff;color:#fff;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700}
#main{display:flex;flex-direction:column;align-items:center;padding:16px;gap:14px}
canvas{background:#0d0d14;border:1px solid #2a2a45;border-radius:10px}
#message{font-size:18px;font-weight:700;min-height:28px;color:#6c63ff}
#controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button.action{background:#6c63ff;color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
button.action:hover{background:#574fd6}
#dpad{display:grid;grid-template-columns:repeat(3,48px);gap:4px;margin-top:4px}
#dpad button{background:#1e1e30;border:1px solid #2a2a45;color:#e8e8f0;height:48px;border-radius:8px;font-size:20px;cursor:pointer}
#dpad button:hover{background:#2a2a45}
#level-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.lvl-btn{background:#1e1e30;border:1px solid #2a2a45;color:#9898b8;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer}
.lvl-btn.active{border-color:#6c63ff;color:#6c63ff}
.lvl-btn:hover{border-color:#6c63ff}
#stats{font-size:14px;color:#9898b8}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <h1>&#128756; Sokoban</h1>
  <span id="score-badge">Moves: 0</span>
</div>
<div id="main">
  <div id="level-row"></div>
  <div id="stats">Moves: <b id="moves">0</b> | Boxes on target: <b id="boxes-on">0</b></div>
  <canvas id="canvas"></canvas>
  <div id="message"></div>
  <div id="controls">
    <button class="action" onclick="undoMove()">Undo</button>
    <button class="action" onclick="resetLevel()">Reset Level</button>
  </div>
  <div id="dpad">
    <div></div>
    <button onclick="move(0,-1)">&#8593;</button>
    <div></div>
    <button onclick="move(-1,0)">&#8592;</button>
    <button onclick="move(0,1)">&#8595;</button>
    <button onclick="move(1,0)">&#8594;</button>
  </div>
  <div style="font-size:12px;color:#9898b8">Arrow keys or buttons to move</div>
</div>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();};}

// W=wall, ' '=floor, P=player, B=box, T=target, X=box on target, @=player on target
const LEVELS=[
`#######
#     #
# B T #
#  P  #
#     #
#######`,
`########
#      #
# BT   #
# B T  #
#  P   #
########`,
`#######
# T T #
# B B #
#  P  #
#     #
#######`,
`########
##   ###
# B   ##
# BTT  #
#  P B #
##   ###
########`,
`##########
#    #   #
# BB T   #
# B  TT  #
##  P    #
##########`
];

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const S=44;
let state,levelIdx=0,moves=0,history=[];

function parseLevel(str){
  const rows=str.trim().split('\n');
  const grid=rows.map(r=>r.split(''));
  let player={r:0,c:0};const boxes=[];const targets=[];
  grid.forEach((row,r)=>row.forEach((ch,c)=>{
    if(ch==='P'||ch==='@'){player={r,c};}
    if(ch==='B'||ch==='X')boxes.push({r,c});
    if(ch==='T'||ch==='X'||ch==='@')targets.push({r,c});
    if(ch==='P'||ch==='B')grid[r][c]=' ';
    if(ch==='X')grid[r][c]='T';
    if(ch==='@')grid[r][c]='T';
  }));
  return {grid,player,boxes,targets,rows:grid.length,cols:grid[0].length};
}

function deepCopy(s){return JSON.parse(JSON.stringify(s));}

function loadLevel(idx){
  levelIdx=idx;moves=0;history=[];
  state=parseLevel(LEVELS[idx]);
  document.getElementById('moves').textContent=0;
  document.getElementById('score-badge').textContent='Moves: 0';
  document.getElementById('message').textContent='';
  updateBoxCount();
  resizeCanvas();draw();
  document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function resizeCanvas(){
  canvas.width=state.cols*S;canvas.height=state.rows*S;
}

function updateBoxCount(){
  const on=state.boxes.filter(b=>state.targets.some(t=>t.r===b.r&&t.c===b.c)).length;
  document.getElementById('boxes-on').textContent=on+'/'+state.boxes.length;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const {grid,player,boxes,targets,rows,cols}=state;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const x=c*S,y=r*S;
    const ch=grid[r][c];
    if(ch==='#'){ctx.fillStyle='#2a2a45';ctx.fillRect(x,y,S,S);ctx.fillStyle='#3a3a60';ctx.fillRect(x+2,y+2,S-4,2);}
    else{ctx.fillStyle='#0d0d14';ctx.fillRect(x,y,S,S);}
    if(ch==='T'){ctx.fillStyle='rgba(46,204,113,0.25)';ctx.fillRect(x+4,y+4,S-8,S-8);ctx.strokeStyle='#2ecc71';ctx.lineWidth=2;ctx.strokeRect(x+8,y+8,S-16,S-16);}
  }
  targets.forEach(t=>{
    const x=t.c*S,y=t.r*S;
    ctx.fillStyle='rgba(46,204,113,0.2)';ctx.fillRect(x+4,y+4,S-8,S-8);
    ctx.strokeStyle='#2ecc71';ctx.lineWidth=2;ctx.strokeRect(x+8,y+8,S-16,S-16);
  });
  boxes.forEach(b=>{
    const onTarget=targets.some(t=>t.r===b.r&&t.c===b.c);
    const x=b.c*S+4,y=b.r*S+4;
    ctx.fillStyle=onTarget?'#1a6e3f':'#6c3a0a';
    ctx.roundRect(x,y,S-8,S-8,6);ctx.fill();
    ctx.strokeStyle=onTarget?'#2ecc71':'#e67e22';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 20px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(onTarget?'✓':'📦',b.c*S+S/2,b.r*S+S/2);
  });
  // Player
  const px=player.c*S+S/2,py=player.r*S+S/2;
  ctx.fillStyle='#6c63ff';ctx.beginPath();ctx.arc(px,py-8,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#574fd6';ctx.beginPath();ctx.arc(px,py+8,13,Math.PI,0);ctx.fill();
}

function move(dc,dr){
  const {player,boxes,targets,grid}=state;
  const nr=player.r+dr,nc=player.c+dc;
  if(grid[nr]&&grid[nr][nc]==='#')return;
  const bi=boxes.findIndex(b=>b.r===nr&&b.c===nc);
  if(bi>=0){
    const br2=nr+dr,bc2=nc+dc;
    if(grid[br2]&&grid[br2][bc2]&&grid[br2][bc2]!=='#'&&!boxes.some(b=>b.r===br2&&b.c===bc2)){
      history.push(deepCopy(state));
      state.boxes[bi]={r:br2,c:bc2};
      state.player={r:nr,c:nc};
    } else return;
  } else {
    history.push(deepCopy(state));
    state.player={r:nr,c:nc};
  }
  moves++;document.getElementById('moves').textContent=moves;document.getElementById('score-badge').textContent='Moves: '+moves;
  updateBoxCount();draw();
  const on=state.boxes.filter(b=>state.targets.some(t=>t.r===b.r&&t.c===b.c)).length;
  if(on===state.boxes.length){
    document.getElementById('message').textContent='Level complete! Well done!';
    setTimeout(()=>{if(levelIdx<LEVELS.length-1)loadLevel(levelIdx+1);},1500);
  }
}

function undoMove(){if(history.length){state=history.pop();moves=Math.max(0,moves-1);document.getElementById('moves').textContent=moves;document.getElementById('score-badge').textContent='Moves: '+moves;updateBoxCount();draw();}}
function resetLevel(){loadLevel(levelIdx);}

// Build level buttons
const lr=document.getElementById('level-row');
LEVELS.forEach((_,i)=>{const b=document.createElement('button');b.className='lvl-btn';b.textContent='Level '+(i+1);b.onclick=()=>loadLevel(i);lr.appendChild(b);});

document.addEventListener('keydown',e=>{
  const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  if(map[e.key]){e.preventDefault();move(...map[e.key]);}
  if(e.key==='z'||e.key==='Z')undoMove();
});

loadLevel(0);
</script>
</body>
</html>
