<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pinball – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
#topbar{width:100%;background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}#topbar a:hover{color:#6c63ff}
.title{font-size:18px;font-weight:700;flex:1}
#badge{background:#2a2a45;border-radius:8px;padding:4px 12px;font-size:13px;color:#9898b8}
#badge span{color:#e8e8f0;font-weight:700}
canvas{border:2px solid #2a2a45;border-radius:4px;margin-top:8px}
#btns{display:flex;gap:12px;margin:10px 0;justify-content:center}
.fbtn{padding:12px 28px;background:#1e1e30;border:1px solid #2a2a45;border-radius:8px;color:#e8e8f0;font-size:16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;min-width:90px}
.fbtn:active,.fbtn.pressed{background:#6c63ff}
#plungerBtn{background:#3a1a1a;border-color:#6a2a2a;width:120px}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,13,20,.93);border:2px solid #6c63ff;border-radius:12px;padding:24px 36px;text-align:center;z-index:10;min-width:240px}
#msg h2{color:#6c63ff;font-size:26px;margin-bottom:8px}
#msg p{color:#9898b8;margin-bottom:14px}
#msg button{background:#6c63ff;border:none;color:#fff;padding:10px 28px;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <span class="title">🎯 Pinball</span>
  <div id="badge">Score:<span id="sd">0</span> Lives:<span id="ld">3</span></div>
</div>
<div style="position:relative">
<canvas id="c"></canvas>
<div id="msg">
  <h2 id="mt">Pinball</h2>
  <p id="mp">Z = Left Flipper &nbsp; X = Right Flipper<br>Hold Space to charge plunger, release to launch!</p>
  <button onclick="startGame()">Start</button>
</div>
</div>
<div id="btns">
  <button class="fbtn" id="btnL" ontouchstart="keys.z=true" ontouchend="keys.z=false">◀ Left (Z)</button>
  <button class="fbtn" id="plungerBtn" ontouchstart="startPlunge()" ontouchend="releasePlunge()">⬆ Launch</button>
  <button class="fbtn" id="btnR" ontouchstart="keys.x=true" ontouchend="keys.x=false">Right (X) ▶</button>
</div>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this}}

const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=300,H=520;C.width=W;C.height=H;
const GRAVITY=600;const BALL_R=8;

let ball,flippers,bumpers,score,lives,gameState,keys,animId,lastTs,plunger,particles,bumperFlash;

const BUMPER_DEFS=[
  {x:80,y:130,r:22},{x:200,y:130,r:22},{x:140,y:200,r:22},
  {x:70,y:260,r:18},{x:210,y:260,r:18}
];
const WALL_SEGS=[
  {x1:0,y1:0,x2:0,y2:H},{x1:W,y1:0,x2:W,y2:H},
  {x1:0,y1:0,x2:W,y2:0},
  {x1:0,y1:H-80,x2:40,y2:H-40},{x1:W,y1:H-80,x2:W-40,y2:H-40},
];

function startGame(){
  document.getElementById('msg').style.display='none';
  score=0;lives=3;particles=[];bumperFlash=Array(BUMPER_DEFS.length).fill(0);
  keys={};plunger={charging:false,power:0};
  flippers=[
    {x:70,y:H-60,len:52,angle:0.4,dir:-1,side:'left'},
    {x:W-70,y:H-60,len:52,angle:Math.PI-0.4,dir:1,side:'right'}
  ];
  bumpers=BUMPER_DEFS.map(b=>({...b}));
  spawnBall();
  gameState='playing';
  lastTs=performance.now();
  if(animId) cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
  updateHUD();
}

function spawnBall(){
  ball={x:W-14,y:H-100,vx:0,vy:0,launched:false};
}

function updateHUD(){document.getElementById('sd').textContent=score;document.getElementById('ld').textContent=lives;}

function startPlunge(){plunger.charging=true;}
function releasePlunge(){
  if(!ball.launched&&plunger.charging){ball.vy=-Math.max(200,plunger.power*8);ball.vx=-1;ball.launched=true;}
  plunger.charging=false;plunger.power=0;
}

function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.033);lastTs=ts;
  if(gameState==='playing'){update(dt);draw();}
  animId=requestAnimationFrame(loop);
}

function update(dt){
  // Plunger
  if(plunger.charging&&!ball.launched) plunger.power=Math.min(plunger.power+dt*80,80);
  // Flipper angles
  const targetL=keys.z?-0.25:0.4;
  const targetR=keys.x?Math.PI+0.25:Math.PI-0.4;
  flippers[0].angle+=(targetL-flippers[0].angle)*0.25;
  flippers[1].angle+=(targetR-flippers[1].angle)*0.25;
  if(!ball.launched) return;
  // Physics
  ball.vy+=GRAVITY*dt;
  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;
  // Wall bounce
  if(ball.x-BALL_R<0){ball.x=BALL_R;ball.vx=Math.abs(ball.vx)*0.85;}
  if(ball.x+BALL_R>W){ball.x=W-BALL_R;ball.vx=-Math.abs(ball.vx)*0.85;}
  if(ball.y-BALL_R<0){ball.y=BALL_R;ball.vy=Math.abs(ball.vy)*0.8;}
  // Bumper collision
  bumpers.forEach((b,i)=>{
    const dx=ball.x-b.x,dy=ball.y-b.y,d=Math.hypot(dx,dy);
    if(d<b.r+BALL_R){
      const nx=dx/d,ny=dy/d;
      const dot=ball.vx*nx+ball.vy*ny;
      ball.vx=(ball.vx-2*dot*nx)*-1.1;ball.vy=(ball.vy-2*dot*ny)*-1.1;
      const speed=Math.hypot(ball.vx,ball.vy);
      if(speed<300){ball.vx=ball.vx/speed*320;ball.vy=ball.vy/speed*320;}
      ball.x=b.x+nx*(b.r+BALL_R+1);ball.y=b.y+ny*(b.r+BALL_R+1);
      score+=100;bumperFlash[i]=0.25;updateHUD();
      for(let j=0;j<6;j++) particles.push({x:ball.x,y:ball.y,vx:(Math.random()-.5)*150,vy:(Math.random()-.5)*150,life:.4,color:'#6c63ff'});
    }
    if(bumperFlash[i]>0) bumperFlash[i]-=dt;
  });
  // Flipper collision
  flippers.forEach(f=>{
    const tx=f.x+Math.cos(f.angle)*f.len,ty=f.y+Math.sin(f.angle)*f.len;
    const dx=tx-f.x,dy=ty-f.y,len=Math.hypot(dx,dy);
    const t=Math.max(0,Math.min(1,((ball.x-f.x)*dx+(ball.y-f.y)*dy)/(len*len)));
    const cx=f.x+t*dx,cy=f.y+t*dy;
    const dist=Math.hypot(ball.x-cx,ball.y-cy);
    if(dist<BALL_R+5){
      const nx=(ball.x-cx)/dist,ny=(ball.y-cy)/dist;
      ball.x=cx+nx*(BALL_R+5+1);ball.y=cy+ny*(BALL_R+5+1);
      const dot=ball.vx*nx+ball.vy*ny;
      ball.vx-=2*dot*nx;ball.vy-=2*dot*ny;
      const boost=f.side==='left'?keys.z:keys.x;
      if(boost){const sp=Math.hypot(ball.vx,ball.vy);ball.vx=ball.vx/sp*Math.max(sp,380);ball.vy=ball.vy/sp*Math.max(sp,380);}
    }
  });
  // Gutter - angled walls at bottom
  // Left gutter wall
  {const wx=40,wy=H-40;const dx=wx,dy=-(wy-(H-80));const len=Math.hypot(wx,dy);const t=Math.max(0,Math.min(1,((ball.x-0)*wx+(ball.y-(H-80))*dy)/(len*len)));const cx=t*wx,cy=(H-80)+t*dy;const d=Math.hypot(ball.x-cx,ball.y-cy);if(d<BALL_R+2){const nx=(ball.x-cx)/d,ny=(ball.y-cy)/d;ball.x=cx+nx*(BALL_R+3);ball.y=cy+ny*(BALL_R+3);ball.vx=ball.vx*.8;ball.vy=Math.abs(ball.vy)*-.6;}}
  // Right gutter wall
  {const sx=W-40,sy=H-40;const dx=40,dy=(H-80)-sy;const len=Math.hypot(40,dy);const t=Math.max(0,Math.min(1,((ball.x-sx)*40+(ball.y-sy)*dy)/(len*len)));const cx=sx+t*40,cy=sy+t*dy;const d=Math.hypot(ball.x-cx,ball.y-cy);if(d<BALL_R+2){const nx=(ball.x-cx)/d,ny=(ball.y-cy)/d;ball.x=cx+nx*(BALL_R+3);ball.y=cy+ny*(BALL_R+3);ball.vx=ball.vx*.8;ball.vy=Math.abs(ball.vy)*-.6;}}
  // Lost
  if(ball.y>H+20){lives--;updateHUD();if(lives<=0)endGame();else{spawnBall();}}
  particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;return p.life>0;});
}

function endGame(){
  gameState='over';
  document.getElementById('mt').textContent='Game Over';
  document.getElementById('mp').textContent='Final Score: '+score;
  document.querySelector('#msg button').textContent='Play Again';
  document.getElementById('msg').style.display='block';
}

function draw(){
  ctx.fillStyle='#0d0d14';ctx.fillRect(0,0,W,H);
  // Table border
  ctx.strokeStyle='#2a2a45';ctx.lineWidth=3;ctx.strokeRect(0,0,W,H);
  // Gutter lines
  ctx.strokeStyle='#3a3a6a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,H-80);ctx.lineTo(40,H-40);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W,H-80);ctx.lineTo(W-40,H-40);ctx.stroke();
  // Plunger lane
  ctx.fillStyle='#1a1a2a';ctx.fillRect(W-20,H-160,20,160);
  ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(W-20,H-160,20,160);
  if(plunger.charging&&!ball.launched){ctx.fillStyle='#ff6600';ctx.fillRect(W-18,H-20-plunger.power,16,plunger.power+2);}
  // Bumpers
  bumpers.forEach((b,i)=>{
    const flash=bumperFlash[i]>0;
    const grad=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    grad.addColorStop(0,flash?'#fff':'#9090ff');grad.addColorStop(1,flash?'#6c63ff':'#2a2a80');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=flash?'#fff':'#6c63ff';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=flash?'#000':'#fff';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('100',b.x,b.y);
  });
  // Flippers
  flippers.forEach(f=>{
    ctx.strokeStyle='#6c63ff';ctx.lineWidth=10;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(f.x+Math.cos(f.angle)*f.len,f.y+Math.sin(f.angle)*f.len);ctx.stroke();
  });
  // Ball
  if(ball){
    const grad=ctx.createRadialGradient(ball.x-3,ball.y-3,1,ball.x,ball.y,BALL_R);
    grad.addColorStop(0,'#fff');grad.addColorStop(.5,'#ccc');grad.addColorStop(1,'#888');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();
  }
  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life*2;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  // Launch guide
  if(!ball.launched){
    ctx.fillStyle='#9898b8';ctx.font='11px Segoe UI';ctx.textAlign='center';
    ctx.fillText('Hold Space to',W/2,H-20);ctx.fillText('charge & release!',W/2,H-8);
  }
}

let keys={};
document.addEventListener('keydown',e=>{
  if(e.key==='z'||e.key==='Z') keys.z=true;
  if(e.key==='x'||e.key==='X') keys.x=true;
  if(e.key===' '){e.preventDefault();startPlunge();}
});
document.addEventListener('keyup',e=>{
  if(e.key==='z'||e.key==='Z') keys.z=false;
  if(e.key==='x'||e.key==='X') keys.x=false;
  if(e.key===' ') releasePlunge();
});
document.getElementById('btnL').addEventListener('mousedown',()=>keys.z=true);document.getElementById('btnL').addEventListener('mouseup',()=>keys.z=false);document.getElementById('btnL').addEventListener('mouseleave',()=>keys.z=false);
document.getElementById('btnR').addEventListener('mousedown',()=>keys.x=true);document.getElementById('btnR').addEventListener('mouseup',()=>keys.x=false);document.getElementById('btnR').addEventListener('mouseleave',()=>keys.x=false);
document.getElementById('plungerBtn').addEventListener('mousedown',startPlunge);document.getElementById('plungerBtn').addEventListener('mouseup',releasePlunge);document.getElementById('plungerBtn').addEventListener('mouseleave',releasePlunge);

document.getElementById('msg').style.display='block';gameState='idle';
</script>
</body>
</html>
