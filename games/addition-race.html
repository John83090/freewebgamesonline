<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Addition Race – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:12px 20px;display:flex;align-items:center;gap:16px}
.topbar a{color:#9898b8;text-decoration:none;font-size:20px}.topbar a:hover{color:#6c63ff}
.topbar h1{font-size:18px;font-weight:600;flex:1}
.score-badge{background:#6c63ff;color:#fff;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700}
.game-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px;gap:16px;max-width:560px;margin:0 auto;width:100%}
.setup-card{background:#1e1e30;border:1px solid #2a2a45;border-radius:16px;padding:24px;text-align:center;width:100%;display:flex;flex-direction:column;gap:14px;align-items:center}
.setup-card h2{font-size:22px;font-weight:700}
.diff-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.diff-btn{background:#0d0d14;border:2px solid #2a2a45;border-radius:10px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:700;color:#e8e8f0}
.diff-btn:hover,.diff-btn.active{border-color:#6c63ff;background:#1a1a30}
.race-track{width:100%;background:#1e1e30;border:1px solid #2a2a45;border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px}
.car-row{display:flex;align-items:center;gap:10px}
.car-label{font-size:13px;color:#9898b8;width:50px;text-align:right;flex-shrink:0}
.track{flex:1;height:36px;background:#0d0d14;border-radius:18px;border:1px solid #2a2a45;position:relative;overflow:hidden}
.car{position:absolute;top:50%;transform:translateY(-50%);font-size:22px;transition:left .3s ease;line-height:1}
.finish-line{position:absolute;right:0;top:0;width:6px;height:100%;background:repeating-linear-gradient(180deg,#fff 0,#fff 4px,#000 4px,#000 8px);opacity:.5;border-radius:0 18px 18px 0}
.score-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;width:100%}
.sbox{background:#1e1e30;border:1px solid #2a2a45;border-radius:10px;padding:8px 18px;text-align:center}
.sbox .v{font-size:20px;font-weight:800;color:#6c63ff}
.sbox .l{font-size:11px;color:#9898b8}
.problem-card{background:#1e1e30;border:2px solid #6c63ff;border-radius:14px;padding:20px;text-align:center;width:100%}
.problem{font-size:38px;font-weight:900}
.feedback{font-size:16px;font-weight:700;min-height:24px;text-align:center}
.feedback.ok{color:#2ecc71}
.feedback.err{color:#e74c3c}
.input-row{display:flex;gap:10px;justify-content:center}
input.ans-input{background:#0d0d14;border:2px solid #2a2a45;border-radius:10px;color:#e8e8f0;font-size:24px;padding:10px;text-align:center;width:150px;outline:none}
input.ans-input:focus{border-color:#6c63ff}
button.go-btn{background:#6c63ff;border:none;color:#fff;padding:10px 22px;border-radius:10px;font-size:16px;cursor:pointer;font-weight:700}
button.go-btn:hover{background:#574fd6}
.end-card{background:#1e1e30;border:1px solid #2a2a45;border-radius:16px;padding:24px;text-align:center;width:100%;display:none;flex-direction:column;gap:12px;align-items:center}
.end-title{font-size:32px;font-weight:900}
.end-sub{color:#9898b8;font-size:15px}
button.ctrl{background:#6c63ff;border:none;color:#fff;padding:10px 28px;border-radius:10px;font-size:15px;cursor:pointer;font-weight:700}
button.ctrl:hover{background:#574fd6}
</style>
</head>
<body>
<div class="topbar">
  <a href="../index.html">&#8592;</a>
  <h1>🏎️ Addition Race</h1>
  <span class="score-badge" id="score-badge">Wins: 0</span>
</div>
<div class="game-area">
  <div class="setup-card" id="setup-card">
    <h2>Choose Difficulty</h2>
    <div class="diff-row">
      <div class="diff-btn active" id="d-easy" onclick="selectDiff('easy')">Easy<br><span style="font-size:11px;color:#9898b8">1-digit</span></div>
      <div class="diff-btn" id="d-medium" onclick="selectDiff('medium')">Medium<br><span style="font-size:11px;color:#9898b8">2-digit</span></div>
      <div class="diff-btn" id="d-hard" onclick="selectDiff('hard')">Hard<br><span style="font-size:11px;color:#9898b8">3-digit</span></div>
    </div>
    <button class="go-btn" onclick="startRace()">Start Race!</button>
  </div>
  <div id="race-ui" style="display:none;flex-direction:column;align-items:center;gap:14px;width:100%">
    <div class="race-track">
      <div class="car-row">
        <div class="car-label">You</div>
        <div class="track">
          <div class="car" id="player-car" style="left:0%">🏎️</div>
          <div class="finish-line"></div>
        </div>
        <div style="font-size:13px;font-weight:700;color:#6c63ff;width:28px" id="p-score">0</div>
      </div>
      <div class="car-row">
        <div class="car-label">AI</div>
        <div class="track">
          <div class="car" id="ai-car" style="left:0%">🤖</div>
          <div class="finish-line"></div>
        </div>
        <div style="font-size:13px;font-weight:700;color:#e74c3c;width:28px" id="ai-score">0</div>
      </div>
    </div>
    <div class="score-row">
      <div class="sbox"><div class="v" id="correct-v">0</div><div class="l">Correct</div></div>
      <div class="sbox"><div class="v" id="streak-v">0</div><div class="l">Streak</div></div>
    </div>
    <div class="problem-card">
      <div class="problem" id="problem">--</div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="input-row">
      <input class="ans-input" id="ans-input" type="number" inputmode="numeric" placeholder="?" autocomplete="off">
      <button class="go-btn" onclick="submitAnswer()">✓</button>
    </div>
  </div>
  <div class="end-card" id="end-card">
    <div class="end-title" id="end-title">You Win!</div>
    <div class="end-sub" id="end-sub"></div>
    <button class="ctrl" onclick="backToSetup()">Play Again</button>
  </div>
</div>
<script>
let diff='easy',playerScore=0,aiScore=0,streak=0,correct=0;
let aiInterval=null,currentAnswer=0,gameRunning=false;
let wins=0;
try{wins=parseInt(localStorage.getItem('addrace_wins'))||0;}catch(e){}
document.getElementById('score-badge').textContent='Wins: '+wins;
const GOAL=10;

function selectDiff(d){
  diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('d-'+d).classList.add('active');
}

function genProblem(){
  let a,b;
  if(diff==='easy'){a=Math.floor(Math.random()*9)+1;b=Math.floor(Math.random()*9)+1;}
  else if(diff==='medium'){a=Math.floor(Math.random()*90)+10;b=Math.floor(Math.random()*90)+10;}
  else{a=Math.floor(Math.random()*900)+100;b=Math.floor(Math.random()*900)+100;}
  currentAnswer=a+b;
  document.getElementById('problem').textContent=a+' + '+b+' = ?';
}

function updateCars(){
  const pp=Math.min((playerScore/GOAL)*88,88);
  const ap=Math.min((aiScore/GOAL)*88,88);
  document.getElementById('player-car').style.left=pp+'%';
  document.getElementById('ai-car').style.left=ap+'%';
  document.getElementById('p-score').textContent=playerScore;
  document.getElementById('ai-score').textContent=aiScore;
}

function startRace(){
  playerScore=0;aiScore=0;streak=0;correct=0;gameRunning=true;
  document.getElementById('setup-card').style.display='none';
  document.getElementById('race-ui').style.display='flex';
  document.getElementById('end-card').style.display='none';
  document.getElementById('correct-v').textContent=0;
  document.getElementById('streak-v').textContent=0;
  document.getElementById('feedback').textContent='';
  updateCars();
  genProblem();
  document.getElementById('ans-input').value='';
  document.getElementById('ans-input').focus();
  const aiDelay=diff==='easy'?3000:diff==='medium'?4000:5000;
  aiInterval=setInterval(()=>{
    if(!gameRunning)return;
    aiScore++;updateCars();
    document.getElementById('ai-score').textContent=aiScore;
    if(aiScore>=GOAL)endRace('ai');
  },aiDelay);
}

function submitAnswer(){
  if(!gameRunning)return;
  const val=parseInt(document.getElementById('ans-input').value);
  document.getElementById('ans-input').value='';
  if(isNaN(val))return;
  if(val===currentAnswer){
    playerScore++;streak++;correct++;
    document.getElementById('correct-v').textContent=correct;
    document.getElementById('streak-v').textContent=streak;
    document.getElementById('feedback').className='feedback ok';
    document.getElementById('feedback').textContent='Correct! '+(streak>=3?'Streak x'+streak:'');
    updateCars();
    if(playerScore>=GOAL){endRace('player');return;}
    genProblem();
  } else {
    streak=0;
    document.getElementById('streak-v').textContent=0;
    document.getElementById('feedback').className='feedback err';
    document.getElementById('feedback').textContent='Wrong! Answer: '+currentAnswer;
    genProblem();
  }
  document.getElementById('ans-input').focus();
}

document.getElementById('ans-input').addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer();});

function endRace(winner){
  gameRunning=false;
  clearInterval(aiInterval);
  document.getElementById('race-ui').style.display='none';
  document.getElementById('end-card').style.display='flex';
  if(winner==='player'){
    document.getElementById('end-title').textContent='You Win! 🏆';
    document.getElementById('end-title').style.color='#2ecc71';
    wins++;
    try{localStorage.setItem('addrace_wins',wins);}catch(e){}
    document.getElementById('score-badge').textContent='Wins: '+wins;
  } else {
    document.getElementById('end-title').textContent='AI Wins! 🤖';
    document.getElementById('end-title').style.color='#e74c3c';
  }
  document.getElementById('end-sub').textContent='You got '+correct+' correct | '+playerScore+' vs '+aiScore;
}

function backToSetup(){
  clearInterval(aiInterval);
  document.getElementById('setup-card').style.display='flex';
  document.getElementById('end-card').style.display='none';
}
</script>
</body>
</html>
