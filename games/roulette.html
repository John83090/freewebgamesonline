<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
#topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px}
#topbar a{color:#6c63ff;text-decoration:none;font-size:1.3em}
#topbar h1{font-size:1.1em;flex:1}
.badge{background:#2a2a45;border:1px solid #6c63ff;border-radius:20px;padding:4px 14px;font-size:.9em;color:#6c63ff;font-weight:bold}
#game{max-width:560px;margin:0 auto;padding:12px}
canvas{display:block;margin:0 auto 10px;border-radius:50%;border:3px solid #2a2a45}
.panel{background:#1e1e30;border:1px solid #2a2a45;border-radius:12px;padding:12px;margin-bottom:10px}
.panel h3{color:#6c63ff;margin-bottom:8px;font-size:.85em;text-transform:uppercase;letter-spacing:.05em}
.chip-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.chip{width:46px;height:46px;border-radius:50%;border:3px solid;cursor:pointer;font-weight:bold;font-size:.8em;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.chip:hover,.chip.sel{transform:scale(1.15)}
.chip-10{background:#2a5;border-color:#3f9;color:#fff}
.chip-25{background:#257;border-color:#59f;color:#fff}
.chip-50{background:#842;border-color:#f84;color:#fff}
.chip-100{background:#622;border-color:#f44;color:#fff}
.bet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.bzone{background:#2a2a45;border:1px solid #3a3a55;border-radius:7px;padding:7px 4px;text-align:center;cursor:pointer;font-size:.8em;transition:all .2s;position:relative}
.bzone:hover{border-color:#6c63ff}
.bzone.has-bet{border-color:#6c63ff;background:#1a1a3a}
.bzone .chip-stack{position:absolute;top:2px;right:2px;background:#6c63ff;border-radius:50%;width:18px;height:18px;font-size:.65em;display:flex;align-items:center;justify-content:center;font-weight:bold}
.red{color:#f55}.black{color:#ccc}
#spinBtn{width:100%;padding:13px;background:#6c63ff;border:none;border-radius:10px;color:#fff;font-size:1.05em;font-weight:bold;cursor:pointer;margin-bottom:6px}
#spinBtn:disabled{background:#3a3a55;cursor:not-allowed}
#clearBtn{width:100%;padding:8px;background:#2a2a45;border:1px solid #3a3a55;border-radius:8px;color:#9898b8;cursor:pointer;font-size:.9em}
#status{text-align:center;padding:10px;background:#2a2a45;border-radius:8px;margin-bottom:8px;min-height:40px;font-size:.95em}
.info-row{display:flex;justify-content:space-between;font-size:.85em;margin-top:4px}
.muted{color:#9898b8}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <h1>🎡 Roulette</h1>
  <span class="badge" id="credBadge">1000 credits</span>
</div>
<div id="game">
  <canvas id="wheel" width="220" height="220"></canvas>
  <div id="status">Place chips on the bet table, then spin!</div>
  <div class="panel">
    <h3>Chips</h3>
    <div class="chip-row">
      <div class="chip chip-10" onclick="selChip(10,this)">10</div>
      <div class="chip chip-25" onclick="selChip(25,this)">25</div>
      <div class="chip chip-50" onclick="selChip(50,this)">50</div>
      <div class="chip chip-100 sel" onclick="selChip(100,this)">100</div>
    </div>
    <h3>Bet Table</h3>
    <div class="bet-grid" id="betGrid"></div>
    <div class="info-row"><span class="muted">Total Wagered:</span><span id="totalWager">0</span></div>
  </div>
  <button id="spinBtn" onclick="spin()">🎡 Spin Wheel</button>
  <button id="clearBtn" onclick="clearBets()">Clear All Bets</button>
</div>
<script>
const NUMS=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const RED_NUMS=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const canvas=document.getElementById('wheel');
const ctx=canvas.getContext('2d');
let credits=1000,chipVal=100,bets={},spinning=false,angle=0,ballAngle=0,ballR=80,animFrame=0;
try{const s=localStorage.getItem('rou_cred');if(s)credits=parseInt(s)||1000;}catch(e){}
function save(){try{localStorage.setItem('rou_cred',credits);}catch(e){}}

const BETS_DEF=[
  {id:'red',label:'🔴 Red',pay:1},{id:'black',label:'⚫ Black',pay:1},
  {id:'odd',label:'Odd',pay:1},{id:'even',label:'Even',pay:1},
  {id:'low',label:'1–18',pay:1},{id:'high',label:'19–36',pay:1},
  {id:'d1',label:'1st 12',pay:2},{id:'d2',label:'2nd 12',pay:2},{id:'d3',label:'3rd 12',pay:2},
  {id:'c1',label:'Col 1',pay:2},{id:'c2',label:'Col 2',pay:2},{id:'c3',label:'Col 3',pay:2},
];

function buildGrid(){
  const g=document.getElementById('betGrid');g.innerHTML='';
  BETS_DEF.forEach(b=>{
    const d=document.createElement('div');d.className='bzone';d.id='bz_'+b.id;
    d.innerHTML=`<div>${b.label}</div><div style="font-size:.7em;color:#9898b8">${b.pay}:1</div>`;
    d.onclick=()=>placeBet(b.id);g.appendChild(d);
  });
}

function selChip(v,el){chipVal=v;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}

function placeBet(id){
  if(spinning)return;
  const total=Object.values(bets).reduce((a,b)=>a+b,0);
  if(total+chipVal>credits){setStatus('Not enough credits!');return;}
  bets[id]=(bets[id]||0)+chipVal;
  renderBets();
}

function renderBets(){
  BETS_DEF.forEach(b=>{
    const el=document.getElementById('bz_'+b.id);if(!el)return;
    const v=bets[b.id]||0;
    let stack=el.querySelector('.chip-stack');
    if(v>0){el.classList.add('has-bet');if(!stack){stack=document.createElement('div');stack.className='chip-stack';el.appendChild(stack);}stack.textContent=v;}
    else{el.classList.remove('has-bet');if(stack)stack.remove();}
  });
  const total=Object.values(bets).reduce((a,b)=>a+b,0);
  document.getElementById('totalWager').textContent=total+' credits';
}

function clearBets(){if(spinning)return;bets={};renderBets();}

function setStatus(msg,cls){const el=document.getElementById('status');el.textContent=msg;el.style.color=cls==='win'?'#4caf50':cls==='lose'?'#f44336':'#e8e8f0';}

function drawWheel(a,ba,br){
  ctx.clearRect(0,0,220,220);
  const cx=110,cy=110,r=100;
  NUMS.forEach((n,i)=>{
    const s=a+i*(Math.PI*2/NUMS.length),e=s+Math.PI*2/NUMS.length;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.closePath();
    ctx.fillStyle=n===0?'#1a8a1a':RED_NUMS.has(n)?'#c0392b':'#1a1a1a';ctx.fill();
    ctx.strokeStyle='#0d0d14';ctx.lineWidth=.5;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(s+(e-s)/2);ctx.translate(r*0.78,0);ctx.rotate(Math.PI/2);
    ctx.fillStyle='#fff';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText(n,0,0);ctx.restore();
  });
  ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);ctx.fillStyle='#1e1e30';ctx.fill();
  ctx.strokeStyle='#6c63ff';ctx.lineWidth=2;ctx.stroke();
  // ball
  const bx=cx+Math.cos(ba)*br,by=cy+Math.sin(ba)*br;
  ctx.beginPath();ctx.arc(bx,by,6,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.stroke();
}

function getWinningNum(a){
  const norm=(((-a)%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  const idx=Math.floor(norm/(Math.PI*2/NUMS.length))%NUMS.length;
  return NUMS[idx];
}

function calcPayout(winNum){
  let total=0,detail=[];
  const isRed=RED_NUMS.has(winNum),isEven=winNum>0&&winNum%2===0;
  const dozen=winNum>0?Math.ceil(winNum/12):0;
  const col=winNum>0?((winNum-1)%3)+1:0;
  BETS_DEF.forEach(b=>{
    const v=bets[b.id]||0;if(!v)return;
    let wins=false;
    if(b.id==='red'&&isRed)wins=true;
    else if(b.id==='black'&&winNum>0&&!isRed)wins=true;
    else if(b.id==='odd'&&winNum>0&&!isEven)wins=true;
    else if(b.id==='even'&&isEven)wins=true;
    else if(b.id==='low'&&winNum>=1&&winNum<=18)wins=true;
    else if(b.id==='high'&&winNum>=19)wins=true;
    else if(b.id==='d1'&&dozen===1)wins=true;
    else if(b.id==='d2'&&dozen===2)wins=true;
    else if(b.id==='d3'&&dozen===3)wins=true;
    else if(b.id==='c1'&&col===1)wins=true;
    else if(b.id==='c2'&&col===2)wins=true;
    else if(b.id==='c3'&&col===3)wins=true;
    if(wins){total+=v*(b.pay+1);detail.push(b.label);}
  });
  return{total,detail};
}

function spin(){
  if(spinning)return;
  const total=Object.values(bets).reduce((a,b)=>a+b,0);
  if(!total){setStatus('Place at least one bet first!');return;}
  if(total>credits){setStatus('Not enough credits!');return;}
  spinning=true;credits-=total;document.getElementById('credBadge').textContent=credits+' credits';
  document.getElementById('spinBtn').disabled=true;
  const targetAngle=angle-(Math.PI*2*(5+Math.random()*5));
  const targetBall=ballAngle+(Math.PI*2*(8+Math.random()*6));
  const duration=4000,start=performance.now();
  const startAngle=angle,startBall=ballAngle;
  function animate(now){
    const t=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-t,3);
    angle=startAngle+(targetAngle-startAngle)*ease;
    ballAngle=startBall+(targetBall-startBall)*(1-(1-t)*(1-t));
    ballR=82-12*ease;
    drawWheel(angle,ballAngle,ballR);
    if(t<1){requestAnimationFrame(animate);}
    else{
      angle=targetAngle;ballAngle=targetBall;ballR=70;
      drawWheel(angle,ballAngle,ballR);
      const win=getWinningNum(angle);
      const{total:payout,detail}=calcPayout(win);
      credits+=payout;save();
      document.getElementById('credBadge').textContent=credits+' credits';
      const net=payout-total;
      if(payout>0)setStatus(`🎉 Ball landed on ${win}! Won ${payout} credits (net +${net}). Winning: ${detail.join(', ')}`,'win');
      else setStatus(`😞 Ball landed on ${win}. No winning bets. Lost ${total} credits.`,'lose');
      spinning=false;document.getElementById('spinBtn').disabled=false;
      if(credits<=0){credits=1000;save();setStatus('Out of credits! Refilled to 1000.');document.getElementById('credBadge').textContent='1000 credits';}
    }
  }
  requestAnimationFrame(animate);
}

buildGrid();drawWheel(0,0,82);
</script>
</body>
</html>
