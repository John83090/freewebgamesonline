<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wordle – DuckMath</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.topbar{width:100%;background:#13131f;border-bottom:1px solid #2a2a45;padding:10px 20px;display:flex;align-items:center;gap:12px}
.back{color:#9898b8;text-decoration:none;font-size:0.85rem}.back:hover{color:#e8e8f0}
.game-title{font-weight:800;font-size:1rem}.spacer{flex:1}
.badge{background:#1e1e30;border:1px solid #2a2a45;border-radius:20px;padding:4px 14px;font-size:0.85rem;font-weight:700;color:#ffd93d}
.area{display:flex;flex-direction:column;align-items:center;padding:20px;gap:16px;max-width:420px;width:100%;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;max-width:310px}
.cell{aspect-ratio:1;border:2px solid #2a2a45;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;text-transform:uppercase;transition:all 0.3s;background:#13131f}
.cell.filled{border-color:#6c63ff;animation:pop 0.1s}
.cell.correct{background:#4ade80;border-color:#4ade80;color:#000;animation:flip 0.4s}
.cell.present{background:#fbbf24;border-color:#fbbf24;color:#000;animation:flip 0.4s}
.cell.absent{background:#374151;border-color:#374151;color:#9898b8;animation:flip 0.4s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}
.keyboard{display:flex;flex-direction:column;gap:6px;align-items:center;width:100%}
.kb-row{display:flex;gap:5px;justify-content:center}
.key{background:#1e1e30;border:1px solid #2a2a45;color:#e8e8f0;border-radius:6px;padding:14px 10px;min-width:34px;font-size:0.75rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.2s;text-align:center}
.key:hover{background:#2a2a45}
.key.correct{background:#4ade80;border-color:#4ade80;color:#000}
.key.present{background:#fbbf24;border-color:#fbbf24;color:#000}
.key.absent{background:#374151;border-color:#374151;color:#9898b8}
.key-wide{min-width:52px;font-size:0.7rem}
.msg{background:#1e1e30;border:1px solid #2a2a45;border-radius:8px;padding:8px 16px;font-size:0.85rem;text-align:center;min-height:36px;display:flex;align-items:center;justify-content:center;width:100%;max-width:310px}
.btn{background:#6c63ff;border:none;color:#fff;border-radius:8px;padding:10px 24px;font-size:0.9rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="topbar">
  <a class="back" href="../index.html">← Back</a>
  <span class="game-title">🟩 Wordle</span>
  <div class="spacer"></div>
  <div class="badge">Wins: <span id="wins">0</span></div>
</div>
<div class="area">
  <div class="msg" id="msg">Guess the 5-letter word!</div>
  <div class="grid" id="grid"></div>
  <div class="keyboard" id="keyboard"></div>
  <button class="btn" id="newBtn" onclick="newGame()" style="display:none">🔄 New Word</button>
</div>
<script>
const WORDS=['crane','stern','plumb','flock','shiny','brave','crisp','dwarf','ghoul','jazzy','knack','quirk','venom','witch','boxer','chess','drift','frost','glint','hasty','infer','joust','kneel','lodge','mirth','novel','octet','proxy','query','realm','scout','thyme','umbra','vivid','waltz','xenon','yearn','zonal','abbot','blimp','chord','depot','elite','flank','gleam','haste','inbox','jokey','knave','lusty','mourn','notch','oxide','pluck','quote','rivet','smelt','toxic','usher','vigor','wrath','yacht','zilch','abide','braid','clump','deter','expel','fjord','graft','helix','irony','joust','kayak','lilac','mangy','nymph','oxide','prism','quaff','rebut','scoff','trawl','unify','viper','wordy'];
let target,guesses,current,gameOver,wins;
function buildGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<6;r++)for(let c=0;c<5;c++){const d=document.createElement('div');d.className='cell';d.id=`c${r}${c}`;g.appendChild(d);}
}
function buildKeyboard(){
  const rows=['qwertyuiop','asdfghjkl','↵zxcvbnm⌫'];
  const kb=document.getElementById('keyboard');kb.innerHTML='';
  rows.forEach(row=>{
    const div=document.createElement('div');div.className='kb-row';
    [...row].forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+(k==='↵'||k==='⌫'?' key-wide':'');
      btn.textContent=k;btn.id='k'+k;
      btn.onclick=()=>press(k);
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}
function press(k){
  if(gameOver)return;
  if(k==='⌫'){current=current.slice(0,-1);}
  else if(k==='↵'){submit();}
  else if(/^[a-z]$/i.test(k)&&current.length<5){current+=k.toLowerCase();}
  renderCurrent();
}
function renderCurrent(){
  const row=guesses.length;
  for(let c=0;c<5;c++){const el=document.getElementById(`c${row}${c}`);el.textContent=current[c]||'';el.className='cell'+(current[c]?' filled':'');}
}
function submit(){
  if(current.length!==5){flash('Word must be 5 letters!');return;}
  const row=guesses.length;
  const result=Array(5).fill('absent');
  const tc=[...target],cc=[...current];
  // Correct
  for(let i=0;i<5;i++)if(cc[i]===tc[i]){result[i]='correct';tc[i]=null;cc[i]=null;}
  // Present
  for(let i=0;i<5;i++){if(cc[i]===null)continue;const j=tc.indexOf(cc[i]);if(j>=0){result[i]='present';tc[j]=null;}}
  // Animate
  for(let c=0;c<5;c++){
    setTimeout(()=>{
      const el=document.getElementById(`c${row}${c}`);
      el.className='cell '+result[c];
      el.textContent=current[c].toUpperCase();
      updateKey(current[c],result[c]);
    },c*80);
  }
  guesses.push({word:current,result});
  const won=result.every(r=>r==='correct');
  setTimeout(()=>{
    if(won){wins++;(function(){try{localStorage.setItem('wordleWins',wins)}catch(e){}})();document.getElementById('wins').textContent=wins;flash('🎉 Excellent! The word was '+target.toUpperCase());gameOver=true;document.getElementById('newBtn').style.display='block';}
    else if(guesses.length>=6){flash('😢 The word was: '+target.toUpperCase());gameOver=true;document.getElementById('newBtn').style.display='block';}
  },500);
  current='';
}
function updateKey(letter,status){
  const el=document.getElementById('k'+letter);
  if(!el)return;
  const priority={'correct':3,'present':2,'absent':1};
  const cur=el.className.includes('correct')?3:el.className.includes('present')?2:el.className.includes('absent')?1:0;
  if(priority[status]>cur)el.className='key '+status;
}
function flash(msg){const el=document.getElementById('msg');el.textContent=msg;}
function newGame(){
  target=WORDS[Math.floor(Math.random()*WORDS.length)];
  guesses=[];current='';gameOver=false;
  buildGrid();buildKeyboard();
  document.getElementById('msg').textContent='Guess the 5-letter word!';
  document.getElementById('newBtn').style.display='none';
}
document.addEventListener('keydown',e=>{
  if(e.key==='Backspace')press('⌫');
  else if(e.key==='Enter')press('↵');
  else if(/^[a-zA-Z]$/.test(e.key))press(e.key.toLowerCase());
});
wins=parseInt((function(){try{return localStorage.getItem('wordleWins')}catch(e){return null}})()||0);
document.getElementById('wins').textContent=wins;
newGame();
</script>
</body>
</html>
