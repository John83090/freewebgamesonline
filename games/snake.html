<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Snake Classic – DuckMath</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.topbar{width:100%;background:#13131f;border-bottom:1px solid #2a2a45;padding:10px 20px;display:flex;align-items:center;gap:12px}
.back{color:#9898b8;text-decoration:none;font-size:0.85rem}
.back:hover{color:#e8e8f0}
.game-title{font-weight:800;font-size:1rem}
.spacer{flex:1}
.score-badge{background:#1e1e30;border:1px solid #2a2a45;border-radius:20px;padding:4px 14px;font-size:0.85rem;font-weight:700;color:#ffd93d}
.game-area{display:flex;flex-direction:column;align-items:center;padding:24px 16px;gap:16px}
canvas{border:2px solid #6c63ff;border-radius:8px;image-rendering:pixelated;background:#0a0a14;max-width:100%}
.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{background:#1e1e30;border:1px solid #2a2a45;color:#e8e8f0;border-radius:8px;padding:8px 20px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn:hover{background:#6c63ff;border-color:#6c63ff}
.btn-primary{background:#6c63ff;border-color:#6c63ff}
.info-bar{display:flex;gap:24px;font-size:0.85rem;color:#9898b8}
.info-bar span b{color:#e8e8f0}
.dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px);gap:4px;margin-top:8px}
.dpad-btn{background:#1e1e30;border:1px solid #2a2a45;border-radius:8px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.dpad-btn:active{background:#6c63ff}
.dpad-center{background:transparent;border:none;cursor:default}
.overlay{position:absolute;background:rgba(13,13,20,0.92);border:1px solid #2a2a45;border-radius:12px;padding:32px;text-align:center;width:280px}
.overlay h2{font-size:1.5rem;margin-bottom:8px}
.overlay p{color:#9898b8;margin-bottom:20px}
.canvas-wrap{position:relative;display:inline-block}
</style>
</head>
<body>
<script>
// Polyfill: ctx.roundRect (Chrome 99+, Firefox 112+, Safari 15.4+ only)
(function(){
  var p = CanvasRenderingContext2D.prototype;
  if (!p.roundRect) {
    p.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'object') r = r[0];
      r = Math.min(r || 0, Math.abs(w)/2, Math.abs(h)/2);
      this.moveTo(x + r, y);
      this.arcTo(x + w, y,     x + w, y + h, r);
      this.arcTo(x + w, y + h, x,     y + h, r);
      this.arcTo(x,     y + h, x,     y,     r);
      this.arcTo(x,     y,     x + w, y,     r);
      this.closePath();
    };
  }
})();
// Safe localStorage (fails silently in restricted file:// contexts)
var safeStorage = {
  getItem:  function(k)  { try { return (function(){try{return localStorage.getItem(k)}catch(e){return null}})();  } catch(e) { return null; } },
  setItem:  function(k,v){ try { (function(){try{localStorage.setItem(k,v)}catch(e){}})();        } catch(e) {} }
};
</script>

<div class="topbar">
  <a class="back" href="../index.html">← Back</a>
  <span class="game-title">🐍 Snake Classic</span>
  <div class="spacer"></div>
  <div class="score-badge">Score: <span id="score">0</span></div>
  <div class="score-badge" style="color:#60a5fa">Best: <span id="best">0</span></div>
</div>

<div class="game-area">
  <div class="info-bar">
    <span>Level: <b id="level">1</b></span>
    <span>Speed: <b id="speed-display">Normal</b></span>
    <span>Apples: <b id="apples">0</b></span>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2>🐍 Snake</h2>
      <p>Use arrow keys or WASD to move.<br/>Eat apples to grow and score!</p>
      <button class="btn btn-primary" onclick="startGame()">▶ Play</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="startGame()">🔄 Restart</button>
    <select class="btn" id="difficulty" onchange="changeDifficulty()">
      <option value="150">🐢 Easy</option>
      <option value="100" selected>🏃 Normal</option>
      <option value="60">⚡ Hard</option>
      <option value="35">🔥 Extreme</option>
    </select>
  </div>

  <!-- Mobile D-Pad -->
  <div class="dpad">
    <div></div>
    <div class="dpad-btn" onpointerdown="dir(0,-1)">▲</div>
    <div></div>
    <div class="dpad-btn" onpointerdown="dir(-1,0)">◄</div>
    <div class="dpad-center"></div>
    <div class="dpad-btn" onpointerdown="dir(1,0)">►</div>
    <div></div>
    <div class="dpad-btn" onpointerdown="dir(0,1)">▼</div>
    <div></div>
  </div>
</div>

<script>
const CELL = 20, COLS = 20, ROWS = 20;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let snake, food, bonus, dx, dy, ndx, ndy, score, apples, gameLoop, speed, running, level;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dx=1; dy=0; ndx=1; ndy=0;
  score=0; apples=0; level=1;
  placeFood();
  bonus=null;
  updateUI();
}

function placeFood() {
  do { food={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===food.x&&s.y===food.y));
  if (Math.random()<0.2) {
    do { bonus={x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS), t:Date.now()}; }
    while(snake.some(s=>s.x===bonus.x&&s.y===bonus.y));
  }
}

function dir(x,y) {
  if(x!==0 && dx===0){ndx=x;ndy=0;}
  if(y!==0 && dy===0){ndy=y;ndx=0;}
}

function step() {
  dx=ndx; dy=ndy;
  const head={x:snake[0].x+dx, y:snake[0].y+dy};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver(); return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10*level; apples++;
    if(apples%5===0){level++;speed=Math.max(speed-10,30);}
    placeFood();
  } else { snake.pop(); }
  if(bonus&&head.x===bonus.x&&head.y===bonus.y){score+=50;bonus=null;}
  if(bonus&&Date.now()-bonus.t>5000) bonus=null;
  updateUI(); draw();
}

function draw() {
  ctx.fillStyle='#0a0a14'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid
  ctx.strokeStyle='#1a1a2e'; ctx.lineWidth=0.5;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,canvas.height);ctx.stroke();}
  for(let j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*CELL);ctx.lineTo(canvas.width,j*CELL);ctx.stroke();}
  // Food
  ctx.fillStyle='#ef4444';
  ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='10px sans-serif'; ctx.textAlign='center';
  ctx.fillText('🍎',food.x*CELL+CELL/2,food.y*CELL+CELL/2+4);
  // Bonus
  if(bonus){
    const blink = Math.floor((Date.now()-bonus.t)/300)%2===0;
    if(blink){ctx.fillStyle='#ffd93d';ctx.fillText('⭐',bonus.x*CELL+CELL/2,bonus.y*CELL+CELL/2+4);}
  }
  // Snake
  snake.forEach((seg,i)=>{
    const ratio=i/snake.length;
    ctx.fillStyle=i===0?'#6c63ff':`hsl(${260-ratio*60},70%,${60-ratio*20}%)`;
    const pad=i===0?1:2;
    ctx.beginPath();ctx.roundRect(seg.x*CELL+pad,seg.y*CELL+pad,CELL-pad*2,CELL-pad*2,4);ctx.fill();
    if(i===0){
      const ex=dx===1?2:dx===-1?CELL-8:CELL/2-3;
      const ey=dy===1?2:dy===-1?CELL-8:CELL/2-3;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(seg.x*CELL+ex+2,seg.y*CELL+ey+2,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(seg.x*CELL+CELL-ex-4,seg.y*CELL+ey+2,2,0,Math.PI*2);ctx.fill();
    }
  });
}

function updateUI() {
  document.getElementById('score').textContent=score;
  document.getElementById('apples').textContent=apples;
  document.getElementById('level').textContent=level;
  const spd=speed<=40?'🔥 Extreme':speed<=70?'⚡ Hard':speed<=110?'🏃 Normal':'🐢 Easy';
  document.getElementById('speed-display').textContent=spd;
  const best=Math.max(score,parseInt((function(){try{return localStorage.getItem('snakeBest')}catch(e){return null}})()||0));
  (function(){try{localStorage.setItem('snakeBest',best)}catch(e){}})();
  document.getElementById('best').textContent=best;
}

function gameOver() {
  clearInterval(gameLoop); running=false;
  ctx.fillStyle='rgba(13,13,20,0.75)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#e8e8f0';ctx.font='bold 28px Segoe UI';ctx.textAlign='center';
  ctx.fillText('Game Over!',canvas.width/2,canvas.height/2-30);
  ctx.font='18px Segoe UI';ctx.fillStyle='#ffd93d';
  ctx.fillText('Score: '+score,canvas.width/2,canvas.height/2+5);
  ctx.fillStyle='#9898b8';ctx.font='14px Segoe UI';
  ctx.fillText('Press Restart to play again',canvas.width/2,canvas.height/2+35);
}

function startGame() {
  document.getElementById('overlay').style.display='none';
  clearInterval(gameLoop);
  speed=parseInt(document.getElementById('difficulty').value);
  init(); running=true;
  gameLoop=setInterval(step,speed);
}

function changeDifficulty() {
  if(running){clearInterval(gameLoop);speed=parseInt(document.getElementById('difficulty').value);gameLoop=setInterval(step,speed);}
}

document.addEventListener('keydown',e=>{
  const map={'ArrowLeft':[-1,0],'ArrowRight':[1,0],'ArrowUp':[0,-1],'ArrowDown':[0,1],'a':[-1,0],'d':[1,0],'w':[0,-1],'s':[0,1]};
  if(map[e.key]){e.preventDefault();dir(...map[e.key]);}
  if(e.key===' '&&!running)startGame();
});

// Init display
init(); draw();
document.getElementById('best').textContent=(function(){try{return localStorage.getItem('snakeBest')}catch(e){return null}})()||0;
</script>
</body>
</html>
