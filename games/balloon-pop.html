<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Balloon Pop – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden}
#topbar{width:100%;background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:10;position:relative}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}#topbar a:hover{color:#6c63ff}
.title{font-size:18px;font-weight:700;flex:1}
#badge{background:#2a2a45;border-radius:8px;padding:4px 12px;font-size:13px;color:#9898b8}
#badge span{color:#e8e8f0;font-weight:700}
canvas{border:2px solid #2a2a45;border-radius:4px;margin-top:8px;cursor:crosshair;display:block}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,13,20,.93);border:2px solid #6c63ff;border-radius:12px;padding:24px 36px;text-align:center;z-index:10;min-width:260px}
#msg h2{color:#6c63ff;font-size:26px;margin-bottom:8px}
#msg p{color:#9898b8;margin-bottom:14px}
#msg button{background:#6c63ff;border:none;color:#fff;padding:10px 28px;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <span class="title">🎈 Balloon Pop</span>
  <div id="badge">Score:<span id="sd">0</span> &nbsp;Best:<span id="hd">0</span></div>
</div>
<div style="position:relative">
<canvas id="c"></canvas>
<div id="msg">
  <h2 id="mt">Balloon Pop</h2>
  <p id="mp">Pop balloons before they escape!<br>Big=1pt, Medium=3pt, Small=5pt<br>Avoid the 💣 bombs!</p>
  <button onclick="startGame()">Start</button>
</div>
</div>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this}}

const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=400,H=540;C.width=W;C.height=H;

const COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e91e63','#ff5722'];
let balloons,particles,score,timeLeft,gameState,animId,lastTs,spawnTimer,spawnRate,hs;
try{hs=parseInt(localStorage.getItem('bp_hs')||'0');}catch(e){hs=0;}
document.getElementById('hd').textContent=hs;

function startGame(){
  document.getElementById('msg').style.display='none';
  score=0;timeLeft=60;spawnTimer=0;spawnRate=1.5;
  balloons=[];particles=[];
  gameState='playing';
  lastTs=performance.now();
  if(animId) cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
  updateHUD();
}

function updateHUD(){document.getElementById('sd').textContent=score;}

function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  if(gameState==='playing'){update(dt);draw();}
  animId=requestAnimationFrame(loop);
}

function update(dt){
  timeLeft-=dt;if(timeLeft<=0){timeLeft=0;endGame();}
  spawnRate=1.5+((60-timeLeft)/60)*3;
  spawnTimer-=dt;
  if(spawnTimer<=0){spawnTimer=1/spawnRate;spawnBalloon();}
  balloons=balloons.filter(b=>{
    b.y-=b.speed*dt;b.x+=Math.sin(b.phase+=dt*b.wobble)*0.5;
    return b.y+b.r>-20;
  });
  particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;p.life-=dt;return p.life>0;});
}

function spawnBalloon(){
  const isBomb=Math.random()<0.12;
  const sizes=[{r:32,pts:1},{r:22,pts:3},{r:14,pts:5}];
  const s=sizes[Math.floor(Math.random()*3)];
  balloons.push({
    x:s.r+Math.random()*(W-s.r*2),y:H+s.r,r:s.r,
    speed:40+Math.random()*40+((60-timeLeft)/60)*30,
    color:isBomb?'#222':COLORS[Math.floor(Math.random()*COLORS.length)],
    pts:isBomb?-10:s.pts,bomb:isBomb,phase:Math.random()*Math.PI*2,wobble:1+Math.random()*2
  });
}

function tryPop(mx,my){
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    if(Math.hypot(mx-b.x,my-b.y)<b.r){
      if(b.bomb){score=Math.max(0,score-10);spawnParticles(b.x,b.y,'#ff4444',true);}
      else{score+=b.pts;spawnParticles(b.x,b.y,b.color,false);}
      balloons.splice(i,1);
      updateHUD();
      showPop(mx,my,b.bomb?'-10':'+'+(b.pts),b.bomb?'#ff4444':'#ffe000');
      return;
    }
  }
}

function spawnParticles(x,y,color,big){
  const n=big?16:10;
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*(big?200:140),vy:(Math.random()-.5)*(big?200:140)-60,life:.5+Math.random()*.3,color,r:big?6:4});
}

function showPop(x,y,text,color){
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;left:${x+C.getBoundingClientRect().left-15}px;top:${y+C.getBoundingClientRect().top-20}px;color:${color};font-weight:700;font-size:18px;pointer-events:none;z-index:99;animation:fadeUp .6s forwards`;
  d.textContent=text;document.body.appendChild(d);
  if(!document.getElementById('fadeUpStyle')){const s=document.createElement('style');s.id='fadeUpStyle';s.textContent='@keyframes fadeUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}';document.head.appendChild(s);}
  setTimeout(()=>d.remove(),700);
}

function endGame(){
  gameState='over';
  if(score>hs){hs=score;try{localStorage.setItem('bp_hs',hs);}catch(e){}document.getElementById('hd').textContent=hs;}
  document.getElementById('mt').textContent='Time\'s Up!';
  document.getElementById('mp').textContent='Score: '+score+'\nBest: '+hs;
  document.querySelector('#msg button').textContent='Play Again';
  document.getElementById('msg').style.display='block';
}

function draw(){
  // Sky gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0d1a3a');grad.addColorStop(1,'#0d0d14');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // Balloons
  balloons.forEach(b=>{
    if(b.bomb){
      ctx.font=(b.r*1.8)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('💣',b.x,b.y);
    } else {
      // Balloon shape
      const grad=ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,b.r*.1,b.x,b.y,b.r);
      grad.addColorStop(0,'rgba(255,255,255,.5)');grad.addColorStop(.5,b.color);grad.addColorStop(1,b.color+'aa');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.ellipse(b.x,b.y,b.r,b.r*1.15,0,0,Math.PI*2);
      ctx.fill();
      // Highlight
      ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.ellipse(b.x-b.r*.28,b.y-b.r*.32,b.r*.22,b.r*.15,-.3,0,Math.PI*2);ctx.fill();
      // String
      ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(b.x,b.y+b.r*1.15);
      ctx.quadraticCurveTo(b.x+4,b.y+b.r*1.5,b.x,b.y+b.r*2);ctx.stroke();
      // Points badge
      ctx.fillStyle='#fff';ctx.font='bold '+(b.r*.6)+'px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(b.pts+'pt',b.x,b.y);
    }
  });
  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life*2;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  // Timer bar
  ctx.fillStyle='#2a2a45';ctx.fillRect(0,H-6,W,6);
  ctx.fillStyle=timeLeft>15?'#6c63ff':'#ff4444';ctx.fillRect(0,H-6,W*(timeLeft/60),6);
  // Time text
  ctx.fillStyle='#9898b8';ctx.font='14px Segoe UI';ctx.textAlign='right';ctx.textBaseline='top';
  ctx.fillText(Math.ceil(timeLeft)+'s',W-8,8);
}

C.addEventListener('click',e=>{
  const r=C.getBoundingClientRect();
  tryPop(e.clientX-r.left,e.clientY-r.top);
});
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=C.getBoundingClientRect(),t=e.touches[0];
  tryPop(t.clientX-r.left,t.clientY-r.top);
},{passive:false});

document.getElementById('msg').style.display='block';gameState='idle';
</script>
</body>
</html>
