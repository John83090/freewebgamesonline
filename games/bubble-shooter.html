<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bubble Shooter – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
#topbar{width:100%;background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}#topbar a:hover{color:#6c63ff}
.title{font-size:18px;font-weight:700;flex:1}
#badge{background:#2a2a45;border-radius:8px;padding:4px 12px;font-size:13px;color:#9898b8}
#badge span{color:#e8e8f0;font-weight:700}
canvas{border:2px solid #2a2a45;border-radius:4px;margin-top:8px;cursor:crosshair}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,13,20,.93);border:2px solid #6c63ff;border-radius:12px;padding:24px 36px;text-align:center;z-index:10}
#msg h2{color:#6c63ff;font-size:26px;margin-bottom:8px}
#msg p{color:#9898b8;margin-bottom:14px}
#msg button{background:#6c63ff;border:none;color:#fff;padding:10px 28px;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <span class="title">🫧 Bubble Shooter</span>
  <div id="badge">Score:<span id="sd">0</span> Shots:<span id="shotD">0</span></div>
</div>
<div style="position:relative">
<canvas id="c"></canvas>
<div id="msg">
  <h2 id="mt">Bubble Shooter</h2>
  <p id="mp">Click or tap to aim and shoot!<br>Match 3+ same-color bubbles to pop them.</p>
  <button onclick="startGame()">Start</button>
</div>
</div>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this}}

const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=360,H=580,R=18,COLS=10,COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
C.width=W;C.height=H;

function hexX(col,row){return col*R*2+(row%2?R:0)+R;}
function hexY(row){return row*R*1.72+R+2;}

let grid,shooter,shotBubble,nextColor,score,shots,gameState,animId,aimAngle,particles,lastTs;

function randColor(){return COLORS[Math.floor(Math.random()*COLORS.length)];}

function initGrid(rows=10){
  grid=[];
  for(let r=0;r<rows;r++){
    grid[r]=[];
    const cols=r%2===0?COLS:COLS-1;
    for(let c=0;c<cols;c++) grid[r][c]=randColor();
  }
}

function startGame(){
  document.getElementById('msg').style.display='none';
  score=0;shots=0;particles=[];aimAngle=-Math.PI/2;
  initGrid();
  nextColor=randColor();
  shooter={x:W/2,y:H-30,color:nextColor};
  shotBubble=null;
  gameState='playing';
  lastTs=performance.now();
  if(animId) cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
  updateHUD();
}

function updateHUD(){document.getElementById('sd').textContent=score;document.getElementById('shotD').textContent=shots;}

function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  if(gameState==='playing'){update(dt);draw();}
  animId=requestAnimationFrame(loop);
}

function update(dt){
  particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;return p.life>0;});
  if(!shotBubble) return;
  const s=shotBubble;
  s.x+=Math.cos(s.angle)*s.speed*dt;
  s.y+=Math.sin(s.angle)*s.speed*dt;
  if(s.x-R<0){s.angle=Math.PI-s.angle;s.x=R;}
  if(s.x+R>W){s.angle=Math.PI-s.angle;s.x=W-R;}
  if(s.y-R<0){landBubble(s,0,0);return;}
  // Check collision with grid bubbles
  for(let r=0;r<grid.length;r++){
    if(!grid[r]) continue;
    for(let c=0;c<grid[r].length;c++){
      if(!grid[r][c]) continue;
      const bx=hexX(c,r),by=hexY(r);
      if(Math.hypot(s.x-bx,s.y-by)<R*1.9){landBubble(s,r,c);return;}
    }
  }
}

function landBubble(s,nr,nc){
  // Find best empty cell near collision
  let bestR=0,bestC=0,bestDist=Infinity;
  for(let r=0;r<=Math.min(nr+2,grid.length);r++){
    if(!grid[r]) grid[r]=[];
    const cols=r%2===0?COLS:COLS-1;
    for(let c=0;c<cols;c++){
      if(grid[r][c]) continue;
      const bx=hexX(c,r),by=hexY(r);
      const dist=Math.hypot(s.x-bx,s.y-by);
      if(dist<bestDist){bestDist=dist;bestR=r;bestC=c;}
    }
  }
  if(!grid[bestR]) grid[bestR]=[];
  grid[bestR][bestC]=s.color;
  shotBubble=null;
  shots++;
  // Check matches
  const matched=findMatches(bestR,bestC,s.color);
  if(matched.length>=3){
    matched.forEach(([r,c])=>{spawnParticles(hexX(c,r),hexY(r),grid[r][c]);grid[r][c]=null;});
    score+=matched.length*10;
    dropFloating();
  }
  // Add new row every 5 shots
  if(shots%5===0) addRow();
  // Check game over
  if(grid.some((row,r)=>row&&row.some(c=>c&&hexY(r)>H-80))) endGame(false);
  // Check win
  if(!grid.some(row=>row&&row.some(c=>c))) endGame(true);
  shooter.color=nextColor;nextColor=randColor();
  updateHUD();
}

function findMatches(startR,startC,color){
  const visited=new Set(),queue=[[startR,startC]];
  const matches=[];
  while(queue.length){
    const [r,c]=queue.pop();
    const key=r+','+c;
    if(visited.has(key)) continue;
    visited.add(key);
    if(!grid[r]||grid[r][c]!==color) continue;
    matches.push([r,c]);
    getNeighbors(r,c).forEach(n=>queue.push(n));
  }
  return matches;
}

function getNeighbors(r,c){
  const nb=[];
  const even=r%2===0;
  const pairs=[[r-1,even?c-1:c],[r-1,even?c:c+1],[r,c-1],[r,c+1],[r+1,even?c-1:c],[r+1,even?c:c+1]];
  pairs.forEach(([nr,nc])=>{if(nr>=0&&nr<grid.length&&grid[nr]&&nc>=0&&nc<(nr%2===0?COLS:COLS-1)) nb.push([nr,nc]);});
  return nb;
}

function dropFloating(){
  // BFS from row 0 to find connected bubbles
  const connected=new Set();
  const queue=[];
  if(grid[0]) grid[0].forEach((c,i)=>{if(c){queue.push([0,i]);connected.add('0,'+i);}});
  while(queue.length){
    const [r,c]=queue.shift();
    getNeighbors(r,c).forEach(([nr,nc])=>{const k=nr+','+nc;if(!connected.has(k)&&grid[nr]&&grid[nr][nc]){connected.add(k);queue.push([nr,nc]);}});
  }
  for(let r=0;r<grid.length;r++) if(grid[r]) for(let c=0;c<grid[r].length;c++){
    if(grid[r][c]&&!connected.has(r+','+c)){spawnParticles(hexX(c,r),hexY(r),grid[r][c]);grid[r][c]=null;score+=15;}
  }
}

function addRow(){
  for(let r=grid.length-1;r>=0;r--) grid[r+1]=grid[r];
  grid[0]=[];
  const cols=0%2===0?COLS:COLS-1;
  for(let c=0;c<cols;c++) grid[0][c]=Math.random()<0.7?randColor():null;
}

function spawnParticles(x,y,color){for(let i=0;i<8;i++) particles.push({x,y,vx:(Math.random()-.5)*150,vy:(Math.random()-.5)*150,life:.5,color});}

function endGame(win){
  gameState='over';
  document.getElementById('mt').textContent=win?'You Win!':'Game Over';
  document.getElementById('mp').textContent='Score: '+score;
  document.querySelector('#msg button').textContent='Play Again';
  document.getElementById('msg').style.display='block';
  try{const hs=parseInt(localStorage.getItem('bs_hs')||0);if(score>hs)localStorage.setItem('bs_hs',score);}catch(e){}
}

function draw(){
  ctx.fillStyle='#0d0d14';ctx.fillRect(0,0,W,H);
  // Grid
  for(let r=0;r<grid.length;r++){
    if(!grid[r]) continue;
    for(let c=0;c<grid[r].length;c++){
      if(!grid[r][c]) continue;
      drawBubble(hexX(c,r),hexY(r),R-1,grid[r][c]);
    }
  }
  // Aim line
  if(!shotBubble){
    ctx.strokeStyle='rgba(108,99,255,.4)';ctx.setLineDash([6,6]);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(shooter.x,shooter.y);
    let ax=shooter.x,ay=shooter.y,adir=aimAngle;
    for(let i=0;i<3;i++){
      const nx=ax+Math.cos(adir)*120,ny=ay+Math.sin(adir)*120;
      ctx.lineTo(nx,ny);
      if(nx<R||nx>W-R){adir=Math.PI-adir;}
      ax=nx;ay=ny;
      if(ay<0) break;
    }
    ctx.stroke();ctx.setLineDash([]);
  }
  // Shooter
  drawBubble(shooter.x,shooter.y,R,shooter.color);
  // Shot bubble
  if(shotBubble) drawBubble(shotBubble.x,shotBubble.y,R,shotBubble.color);
  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life*2;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  // Next bubble indicator
  ctx.fillStyle='#9898b8';ctx.font='12px Segoe UI';ctx.textAlign='left';ctx.fillText('Next:',10,H-18);
  drawBubble(55,H-22,10,nextColor);
  // Danger line
  ctx.strokeStyle='rgba(255,68,68,.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(0,H-80);ctx.lineTo(W,H-80);ctx.stroke();ctx.setLineDash([]);
}

function drawBubble(x,y,r,color){
  const grad=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
  grad.addColorStop(0,'rgba(255,255,255,.6)');grad.addColorStop(1,color);
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.stroke();
}

function shoot(){
  if(shotBubble||gameState!=='playing') return;
  shotBubble={x:shooter.x,y:shooter.y,color:shooter.color,angle:aimAngle,speed:500};
}

C.addEventListener('mousemove',e=>{
  const r=C.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const dx=mx-shooter.x,dy=my-shooter.y;
  aimAngle=Math.atan2(dy,dx);
  if(aimAngle>-0.1) aimAngle=-0.1;
  if(aimAngle<-Math.PI+0.1) aimAngle=-Math.PI+0.1;
});
C.addEventListener('click',e=>{
  const r=C.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const dx=mx-shooter.x,dy=my-shooter.y;
  aimAngle=Math.atan2(dy,dx);
  if(aimAngle>-0.1) aimAngle=-0.1;
  if(aimAngle<-Math.PI+0.1) aimAngle=-Math.PI+0.1;
  shoot();
});
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0],r=C.getBoundingClientRect();
  const mx=t.clientX-r.left,my=t.clientY-r.top;
  const dx=mx-shooter.x,dy=my-shooter.y;
  aimAngle=Math.atan2(dy,dx);
  if(aimAngle>-0.1) aimAngle=-0.1;
  if(aimAngle<-Math.PI+0.1) aimAngle=-Math.PI+0.1;
  shoot();
},{passive:false});

document.getElementById('msg').style.display='block';gameState='idle';
</script>
</body>
</html>
