<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frogger – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
#topbar{width:100%;background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}#topbar a:hover{color:#6c63ff}
#topbar .title{font-size:18px;font-weight:700;flex:1}
#badge{background:#2a2a45;border-radius:8px;padding:4px 12px;font-size:13px;color:#9898b8}
#badge span{color:#e8e8f0;font-weight:700}
canvas{border:2px solid #2a2a45;border-radius:4px;margin-top:10px}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,13,20,.92);border:2px solid #6c63ff;border-radius:12px;padding:24px 36px;text-align:center;display:none;z-index:10}
#msg h2{color:#6c63ff;margin-bottom:8px;font-size:26px}
#msg p{color:#9898b8;margin-bottom:14px}
#msg button{background:#6c63ff;border:none;color:#fff;padding:10px 28px;border-radius:8px;font-size:16px;cursor:pointer}
#controls{display:flex;flex-direction:column;align-items:center;gap:6px;margin:10px 0 6px}
.ctrl-row{display:flex;gap:6px}
.cbtn{width:52px;height:52px;background:#1e1e30;border:1px solid #2a2a45;border-radius:8px;color:#e8e8f0;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent}
.cbtn:active{background:#6c63ff}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <span class="title">🐸 Frogger</span>
  <div id="badge">Score:<span id="scoreDisp">0</span> Lives:<span id="livesDisp">3</span> Lvl:<span id="lvlDisp">1</span></div>
</div>
<div style="position:relative">
<canvas id="c"></canvas>
<div id="msg">
  <h2 id="mt">Frogger</h2>
  <p id="mp">Cross the road and river to reach the lily pads!<br>Arrow keys or buttons to move.</p>
  <button onclick="startGame()">Start</button>
</div>
</div>
<div id="controls">
  <div class="ctrl-row"><button class="cbtn" id="bU">▲</button></div>
  <div class="ctrl-row"><button class="cbtn" id="bL">◀</button><button class="cbtn" id="bD">▼</button><button class="cbtn" id="bR">▶</button></div>
</div>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this}}

const C=document.getElementById('c'),ctx=C.getContext('2d');
const CELL=44,COLS=13,ROWS=13;
C.width=COLS*CELL; C.height=ROWS*CELL;

// Row types: 0=safe, 1=road, 2=river, 3=homes
const ROW_TYPES=[3,2,2,2,2,2,0,1,1,1,1,1,0];
// Lane configs [type, speed, dir, objWidth, gap, color]
const LANES=[
  null, // row 0 homes
  {type:'log',  speed:1.2, dir:1,  w:3, gap:2.5, color:'#5a3a1a'},
  {type:'log',  speed:0.9, dir:-1, w:2, gap:2,   color:'#5a3a1a'},
  {type:'turtle',speed:1.1,dir:1,  w:2, gap:2,   color:'#1a7a4a'},
  {type:'log',  speed:1.4, dir:-1, w:3, gap:2.8, color:'#5a3a1a'},
  {type:'log',  speed:0.8, dir:1,  w:2, gap:2.2, color:'#5a3a1a'},
  null, // safe
  {type:'car',  speed:1.5, dir:-1, w:2, gap:1.8, color:'#e74c3c'},
  {type:'car',  speed:1.2, dir:1,  w:1, gap:1.5, color:'#3498db'},
  {type:'truck',speed:0.9, dir:-1, w:3, gap:2,   color:'#e67e22'},
  {type:'car',  speed:1.6, dir:1,  w:1, gap:1.4, color:'#9b59b6'},
  {type:'car',  speed:1.0, dir:-1, w:2, gap:1.9, color:'#2ecc71'},
  null  // start safe
];

let frog,lives,score,level,homes,objects,gameState,timer,timerMax,animId,lastTs;

function makeObjects(lv){
  objects=[];
  for(let r=1;r<=11;r++){
    const cfg=LANES[r]; if(!cfg) continue;
    const spd=cfg.speed*(1+lv*0.1)*CELL;
    const num=Math.floor(COLS/(cfg.w+cfg.gap));
    for(let i=0;i<num;i++){
      objects.push({row:r,x:i*(cfg.w+cfg.gap)*CELL,w:cfg.w*CELL,type:cfg.type,speed:spd,dir:cfg.dir,color:cfg.color});
    }
  }
}

function startGame(){
  document.getElementById('msg').style.display='none';
  lives=3;score=0;level=1;homes=Array(5).fill(false);
  timerMax=30;timer=timerMax;
  makeObjects(level);
  spawnFrog();
  gameState='playing';
  lastTs=performance.now();
  if(animId) cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
}

function spawnFrog(){
  frog={row:12,col:6,x:6*CELL,y:12*CELL,riding:null,alive:true,dead:0};
  timer=timerMax;
  updateHUD();
}

function updateHUD(){
  document.getElementById('scoreDisp').textContent=score;
  document.getElementById('livesDisp').textContent=lives;
  document.getElementById('lvlDisp').textContent=level;
}

function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
  if(gameState==='playing'){update(dt);draw();}
  animId=requestAnimationFrame(loop);
}

function update(dt){
  if(frog.dead>0){frog.dead-=dt;if(frog.dead<=0){if(lives>0)spawnFrog();else endGame();}return;}
  // Move objects
  objects.forEach(o=>{o.x+=o.dir*o.speed*dt;if(o.dir>0&&o.x>C.width) o.x=-o.w;if(o.dir<0&&o.x+o.w<0) o.x=C.width;});
  // Timer
  timer-=dt;if(timer<=0){die();}
  // Riding log
  frog.riding=null;
  if(ROW_TYPES[frog.row]===2){
    let onLog=false;
    for(const o of objects){
      if(o.row!==frog.row) continue;
      if(frog.x+CELL*0.2>=o.x&&frog.x+CELL*0.8<=o.x+o.w){onLog=true;frog.riding=o;break;}
    }
    if(!onLog) die();
    else{frog.x+=frog.riding.dir*frog.riding.speed*dt;frog.x=Math.max(0,Math.min(C.width-CELL,frog.x));}
  }
  // Road collision
  if(ROW_TYPES[frog.row]===1){
    for(const o of objects){
      if(o.row!==frog.row) continue;
      if(frog.x+CELL*0.15<o.x+o.w&&frog.x+CELL*0.85>o.x) die();
    }
  }
  // Home check
  if(frog.row===0){
    const slot=Math.floor(frog.x/CELL/2.4);
    const slots=[1,3,5,7,9];
    let found=false;
    for(let i=0;i<5;i++){
      const sx=slots[i]*CELL;
      if(Math.abs(frog.x-sx)<CELL/2+4&&!homes[i]){homes[i]=true;score+=100+Math.floor(timer*10);found=true;updateHUD();break;}
    }
    if(!found) die();
    else{
      if(homes.every(h=>h)){setTimeout(()=>{level++;homes=Array(5).fill(false);makeObjects(level);spawnFrog();},800);}
      else spawnFrog();
    }
  }
}

function die(){if(frog.dead>0) return;frog.dead=1;lives--;updateHUD();}
function endGame(){gameState='over';document.getElementById('mt').textContent='Game Over';document.getElementById('mp').textContent='Score: '+score;document.querySelector('#msg button').textContent='Play Again';document.getElementById('msg').style.display='block';}

function draw(){
  ctx.fillStyle='#0d0d14';ctx.fillRect(0,0,C.width,C.height);
  for(let r=0;r<ROWS;r++){
    const y=r*CELL;
    if(r===0){ctx.fillStyle='#1a4a1a';ctx.fillRect(0,y,C.width,CELL);}
    else if(ROW_TYPES[r]===2){ctx.fillStyle='#0a2a6a';ctx.fillRect(0,y,C.width,CELL);}
    else if(ROW_TYPES[r]===1){ctx.fillStyle='#2a2a2a';ctx.fillRect(0,y,C.width,CELL);ctx.strokeStyle='#555';ctx.setLineDash([20,10]);ctx.beginPath();ctx.moveTo(0,y+CELL/2);ctx.lineTo(C.width,y+CELL/2);ctx.stroke();ctx.setLineDash([]);}
    else{ctx.fillStyle='#1a3a1a';ctx.fillRect(0,y,C.width,CELL);}
  }
  // Lily pads
  const slots=[1,3,5,7,9];
  slots.forEach((s,i)=>{
    const x=s*CELL;ctx.fillStyle=homes[i]?'#2a8a2a':'#1a5a1a';ctx.beginPath();ctx.ellipse(x+CELL/2,CELL/2,CELL/2-2,CELL/2-4,0,0,Math.PI*2);ctx.fill();
    if(homes[i]){ctx.fillStyle='#00cc44';ctx.font='20px serif';ctx.fillText('🐸',x+4,CELL/2+8);}
  });
  // Objects
  objects.forEach(o=>{
    ctx.fillStyle=o.color;
    if(o.type==='log'||o.type==='turtle'){ctx.beginPath();ctx.roundRect(o.x+2,o.row*CELL+4,o.w-4,CELL-8,8);ctx.fill();if(o.type==='turtle'){ctx.fillStyle='rgba(0,0,0,.3)';for(let j=0;j<Math.floor(o.w/CELL);j++) ctx.beginPath(),ctx.arc(o.x+CELL/2+j*CELL,o.row*CELL+CELL/2,14,0,Math.PI*2),ctx.fill();}}
    else{ctx.beginPath();ctx.roundRect(o.x+1,o.row*CELL+8,o.w-2,CELL-16,5);ctx.fill();ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(o.x+6,o.row*CELL+8,20,6);}
  });
  // Frog
  if(frog.dead<=0||Math.floor(frog.dead*6)%2===0){
    const fx=frog.x,fy=frog.row*CELL;
    if(frog.dead>0){ctx.globalAlpha=0.5;}
    ctx.fillStyle='#44cc44';ctx.beginPath();ctx.ellipse(fx+CELL/2,fy+CELL/2,CELL/2-4,CELL/2-4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(fx+CELL/2-7,fy+12,5,0,Math.PI*2);ctx.arc(fx+CELL/2+7,fy+12,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(fx+CELL/2-7,fy+12,3,0,Math.PI*2);ctx.arc(fx+CELL/2+7,fy+12,3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // Timer bar
  ctx.fillStyle='#2a2a45';ctx.fillRect(0,C.height-4,C.width,4);
  ctx.fillStyle=timer>10?'#6c63ff':'#ff4444';ctx.fillRect(0,C.height-4,C.width*(timer/timerMax),4);
}

function move(dr,dc){
  if(frog.dead>0||gameState!=='playing') return;
  const nr=frog.row+dr,nc=frog.col+dc;
  if(nr<0||nr>=ROWS) return;
  frog.row=nr;frog.col=Math.max(0,Math.min(COLS-1,nc));
  frog.x=frog.col*CELL;frog.y=frog.row*CELL;
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp') move(-1,0);
  else if(e.key==='ArrowDown') move(1,0);
  else if(e.key==='ArrowLeft') move(0,-1);
  else if(e.key==='ArrowRight') move(0,1);
  if(e.key.startsWith('Arrow')) e.preventDefault();
});
document.getElementById('bU').addEventListener('click',()=>move(-1,0));
document.getElementById('bD').addEventListener('click',()=>move(1,0));
document.getElementById('bL').addEventListener('click',()=>move(0,-1));
document.getElementById('bR').addEventListener('click',()=>move(0,1));

document.getElementById('msg').style.display='block';
gameState='idle';
</script>
</body>
</html>
