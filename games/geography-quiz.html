<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Geography Quiz – FreeWebGamesOnline</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<style>
:root{--bg:#0d0d14;--bg2:#13131f;--card:#1e1e30;--border:#2a2a45;--accent:#6c63ff;--text:#e8e8f0;--text2:#9898b8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
.back{color:var(--text2);text-decoration:none;font-size:1.3rem}
.title{font-weight:800;font-size:1.1rem;flex:1}
.score-badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:0.85rem;font-weight:700;color:var(--accent)}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:16px}
#hud{display:flex;gap:20px;font-size:0.9rem;color:var(--text2)}
#hud span{font-weight:700;color:var(--text)}
#question-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;width:100%;max-width:500px}
#category-label{font-size:0.8rem;color:var(--accent);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
#question-text{font-size:1.1rem;font-weight:600;line-height:1.5}
#choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:500px}
.choice-btn{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px 12px;font-size:0.9rem;font-weight:600;color:var(--text);cursor:pointer;text-align:left;transition:border-color 0.15s,transform 0.1s;line-height:1.3}
.choice-btn:hover:not(:disabled){border-color:var(--accent);transform:translateY(-1px)}
.choice-btn.correct{border-color:#22c55e!important;background:#162a1e!important;color:#4ade80}
.choice-btn.wrong{border-color:#ef4444!important;background:#2a1616!important;color:#f87171}
.choice-btn:disabled{cursor:default;opacity:0.8}
#feedback{text-align:center;font-size:0.95rem;font-weight:600;min-height:22px;color:var(--text2)}
#timer-bar-wrap{width:100%;max-width:500px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
#timer-bar{height:100%;background:var(--accent);transition:width 0.1s linear;width:100%}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:50;align-items:center;justify-content:center}
#overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;max-width:360px;width:90%}
.modal h2{font-size:1.6rem;margin-bottom:8px}
.modal p{color:var(--text2);margin-bottom:20px;white-space:pre-line;line-height:1.6}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:1rem;font-weight:700;cursor:pointer}
.btn:hover{background:#8b7cf6}
</style>
</head>
<body>
<header>
  <a class="back" href="../index.html">←</a>
  <span class="title">🌍 Geography Quiz</span>
  <span class="score-badge" id="score-disp">Score: 0</span>
</header>
<main>
  <div id="hud">
    <div>Q: <span id="q-num">1</span>/15</div>
    <div>Streak: <span id="streak">0</span></div>
    <div>⏱ <span id="timer-disp">15</span>s</div>
  </div>
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div id="question-box">
    <div id="category-label">Capitals</div>
    <div id="question-text">Question</div>
  </div>
  <div id="choices"></div>
  <div id="feedback"></div>
</main>
<div id="overlay">
  <div class="modal">
    <h2 id="modal-title">Quiz Complete!</h2>
    <p id="modal-body"></p>
    <button class="btn" onclick="startGame()">Play Again</button>
  </div>
</div>
<script>
const QUESTIONS=[
  // Capitals
  {cat:'Capitals',q:'What is the capital of France?',a:'Paris',choices:['Paris','Lyon','Marseille','Nice']},
  {cat:'Capitals',q:'What is the capital of Japan?',a:'Tokyo',choices:['Osaka','Tokyo','Kyoto','Hiroshima']},
  {cat:'Capitals',q:'What is the capital of Australia?',a:'Canberra',choices:['Sydney','Melbourne','Brisbane','Canberra']},
  {cat:'Capitals',q:'What is the capital of Brazil?',a:'Brasília',choices:['São Paulo','Rio de Janeiro','Brasília','Salvador']},
  {cat:'Capitals',q:'What is the capital of Canada?',a:'Ottawa',choices:['Toronto','Vancouver','Ottawa','Montreal']},
  {cat:'Capitals',q:'What is the capital of South Africa?',a:'Pretoria',choices:['Cape Town','Johannesburg','Durban','Pretoria']},
  {cat:'Capitals',q:'What is the capital of India?',a:'New Delhi',choices:['Mumbai','Kolkata','Chennai','New Delhi']},
  {cat:'Capitals',q:'What is the capital of Argentina?',a:'Buenos Aires',choices:['Córdoba','Buenos Aires','Rosario','Mendoza']},
  {cat:'Capitals',q:'What is the capital of Egypt?',a:'Cairo',choices:['Alexandria','Cairo','Luxor','Giza']},
  {cat:'Capitals',q:'What is the capital of Russia?',a:'Moscow',choices:['Moscow','St. Petersburg','Novosibirsk','Kazan']},
  // Countries
  {cat:'Countries',q:'Which country has the most natural lakes?',a:'Canada',choices:['Russia','USA','Canada','Finland']},
  {cat:'Countries',q:'Which country is the largest by area?',a:'Russia',choices:['Canada','USA','China','Russia']},
  {cat:'Countries',q:'Which country is home to the Amazon rainforest (largest portion)?',a:'Brazil',choices:['Peru','Colombia','Venezuela','Brazil']},
  {cat:'Countries',q:'Mount Everest borders which two countries?',a:'Nepal & China',choices:['Nepal & India','Nepal & China','India & China','Tibet & India']},
  {cat:'Countries',q:'The Nile River flows into which body of water?',a:'Mediterranean Sea',choices:['Red Sea','Indian Ocean','Mediterranean Sea','Persian Gulf']},
  {cat:'Countries',q:'Which country has the most official languages?',a:'Zimbabwe',choices:['South Africa','Switzerland','Zimbabwe','India']},
  // Landmarks
  {cat:'Landmarks',q:'Where is the Great Barrier Reef located?',a:'Australia',choices:['Indonesia','Philippines','New Zealand','Australia']},
  {cat:'Landmarks',q:'In which country is the Sahara Desert located?',a:'Multiple countries (largest portion: Algeria)',choices:['Egypt','Sudan','Algeria','Multiple countries (largest portion: Algeria)']},
  {cat:'Landmarks',q:'Which ocean is the largest?',a:'Pacific Ocean',choices:['Atlantic Ocean','Indian Ocean','Arctic Ocean','Pacific Ocean']},
  {cat:'Landmarks',q:'The Andes Mountains run through which continent?',a:'South America',choices:['North America','Africa','South America','Europe']},
  // Facts
  {cat:'Facts',q:'Which is the smallest country in the world?',a:'Vatican City',choices:['Monaco','Liechtenstein','San Marino','Vatican City']},
  {cat:'Facts',q:'What is the most spoken language in the world by native speakers?',a:'Mandarin Chinese',choices:['English','Spanish','Hindi','Mandarin Chinese']},
  {cat:'Facts',q:'Which continent has the most countries?',a:'Africa',choices:['Asia','Europe','Africa','South America']},
  {cat:'Facts',q:'What percentage of Earth\'s surface is water?',a:'~71%',choices:['~50%','~60%','~71%','~85%']},
  {cat:'Facts',q:'Which country has the longest coastline?',a:'Canada',choices:['Russia','Australia','Norway','Canada']},
  {cat:'Facts',q:'What is the world\'s highest waterfall?',a:'Angel Falls, Venezuela',choices:['Victoria Falls, Zambia','Niagara Falls, USA/Canada','Angel Falls, Venezuela','Iguazu Falls, Brazil/Argentina']},
  {cat:'Facts',q:'Which desert is the largest cold desert?',a:'Antarctic Desert',choices:['Gobi Desert','Patagonian Desert','Great Basin','Antarctic Desert']},
  {cat:'Facts',q:'Which mountain is the tallest from base to peak (not sea level)?',a:'Mauna Kea, Hawaii',choices:['Mount Everest, Nepal','K2, Pakistan','Mauna Kea, Hawaii','Denali, Alaska']},
  {cat:'Facts',q:'What is the longest river in the world?',a:'Nile River',choices:['Amazon River','Yangtze River','Nile River','Mississippi River']},
  {cat:'Facts',q:'Which country has the highest population?',a:'India',choices:['China','India','USA','Indonesia']},
];

let score=0,qIdx=0,streak=0,shuffled=[],timer=15,timerHandle=null,answered=false;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startGame(){
  score=0;streak=0;qIdx=0;
  shuffled=shuffle(QUESTIONS).slice(0,15);
  document.getElementById('score-disp').textContent='Score: 0';
  document.getElementById('overlay').classList.remove('show');
  showQ();
}

function showQ(){
  clearInterval(timerHandle);
  answered=false;
  document.getElementById('feedback').textContent='';
  const q=shuffled[qIdx];
  document.getElementById('q-num').textContent=qIdx+1;
  document.getElementById('streak').textContent=streak;
  document.getElementById('category-label').textContent=q.cat;
  document.getElementById('question-text').textContent=q.q;
  const opts=shuffle(q.choices);
  const wrap=document.getElementById('choices');
  wrap.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.textContent=opt;
    btn.onclick=()=>pick(btn,opt,q.a);
    wrap.appendChild(btn);
  });
  // Timer
  timer=15;
  document.getElementById('timer-disp').textContent=15;
  document.getElementById('timer-bar').style.width='100%';
  timerHandle=setInterval(()=>{
    timer--;
    document.getElementById('timer-disp').textContent=timer;
    document.getElementById('timer-bar').style.width=(timer/15*100)+'%';
    if(timer<=3) document.getElementById('timer-bar').style.background='#ef4444';
    else document.getElementById('timer-bar').style.background='var(--accent)';
    if(timer<=0){clearInterval(timerHandle);if(!answered)timeUp();}
  },1000);
}

function pick(btn,chosen,correct){
  if(answered)return;
  answered=true;
  clearInterval(timerHandle);
  const allBtns=document.querySelectorAll('.choice-btn');
  allBtns.forEach(b=>b.disabled=true);
  if(chosen===correct){
    btn.classList.add('correct');
    const pts=10+Math.floor(timer/3)*2+streak*3;
    score+=pts;
    streak++;
    document.getElementById('score-disp').textContent='Score: '+score;
    document.getElementById('feedback').textContent=`✅ Correct! +${pts} pts`;
  } else {
    btn.classList.add('wrong');
    streak=0;
    document.getElementById('feedback').textContent=`❌ Wrong! Answer: ${correct}`;
    allBtns.forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
  }
  document.getElementById('streak').textContent=streak;
  qIdx++;
  if(qIdx>=15) setTimeout(endGame,1300);
  else setTimeout(showQ,1400);
}

function timeUp(){
  answered=true;
  const allBtns=document.querySelectorAll('.choice-btn');
  allBtns.forEach(b=>b.disabled=true);
  const correct=shuffled[qIdx].a;
  allBtns.forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
  streak=0;
  document.getElementById('streak').textContent=0;
  document.getElementById('feedback').textContent=`⏰ Time's up! Answer: ${correct}`;
  qIdx++;
  if(qIdx>=15) setTimeout(endGame,1300);
  else setTimeout(showQ,1400);
}

function endGame(){
  let hi=0;
  try{hi=parseInt(localStorage.getItem('hi_geography-quiz')||'0');if(score>hi){localStorage.setItem('hi_geography-quiz',score);hi=score;}}catch(e){}
  const pct=Math.round(score/(15*20)*100);
  let grade='🌏 Explorer';
  if(pct>=90) grade='🏆 Geography Master';
  else if(pct>=70) grade='🌍 World Traveler';
  else if(pct>=50) grade='✈️ Adventurer';
  document.getElementById('modal-title').textContent='Quiz Complete!';
  document.getElementById('modal-body').textContent=`Score: ${score}\nHigh Score: ${hi}\n\n${grade}`;
  document.getElementById('overlay').classList.add('show');
}

startGame();
</script>
</body>
</html>
