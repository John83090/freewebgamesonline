<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Endless Runner – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
#topbar{width:100%;background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}#topbar a:hover{color:#6c63ff}
.title{font-size:18px;font-weight:700;flex:1}
#badge{background:#2a2a45;border-radius:8px;padding:4px 12px;font-size:13px;color:#9898b8}
#badge span{color:#e8e8f0;font-weight:700}
canvas{border:2px solid #2a2a45;border-radius:4px;margin-top:8px;display:block}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,13,20,.93);border:2px solid #6c63ff;border-radius:12px;padding:24px 36px;text-align:center;z-index:10;min-width:240px}
#msg h2{color:#6c63ff;font-size:26px;margin-bottom:8px}
#msg p{color:#9898b8;margin-bottom:14px}
#msg button{background:#6c63ff;border:none;color:#fff;padding:10px 28px;border-radius:8px;font-size:16px;cursor:pointer}
#jumpBtn{margin:10px 0;background:#1e1e30;border:1px solid #2a2a45;color:#e8e8f0;padding:12px 40px;border-radius:8px;font-size:18px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
#jumpBtn:active{background:#6c63ff}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <span class="title">🏃 Endless Runner</span>
  <div id="badge">Score:<span id="sd">0</span> Best:<span id="hd">0</span></div>
</div>
<div style="position:relative">
<canvas id="c"></canvas>
<div id="msg">
  <h2 id="mt">Endless Runner</h2>
  <p id="mp">Press Space or tap Jump to leap over obstacles!<br>Double-jump allowed!</p>
  <button onclick="startGame()">Start</button>
</div>
</div>
<button id="jumpBtn" onclick="tryJump()">⬆ JUMP</button>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);this.closePath();return this}}

const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=480,H=280;C.width=W;C.height=H;
const GROUND=H-46;const GRAVITY=1400;const JUMP_V=-520;

let player,obstacles,score,hs,speed,gameState,animId,lastTs,bgLayers,particles,spawnTimer,dist;
try{hs=parseInt(localStorage.getItem('er_hs')||'0');}catch(e){hs=0;}
document.getElementById('hd').textContent=hs;

function initBg(){
  bgLayers=[
    {objs:[],speed:0.15,color:'rgba(30,30,60,.6)',y:40,h:40,s:60},
    {objs:[],speed:0.35,color:'rgba(40,40,80,.8)',y:80,h:60,s:40},
    {objs:[],speed:0.6,color:'rgba(50,30,80,.9)',y:100,h:80,s:25},
  ];
  bgLayers.forEach((l,li)=>{for(let i=0;i<6;i++) l.objs.push({x:i*(W/4)+Math.random()*60,w:20+Math.random()*30,h:l.h+Math.random()*30});});
}

function startGame(){
  document.getElementById('msg').style.display='none';
  score=0;dist=0;speed=220;spawnTimer=0;particles=[];obstacles=[];
  player={x:70,y:GROUND,w:26,h:30,vy:0,jumps:0,onGround:true,frame:0};
  initBg();
  gameState='playing';
  lastTs=performance.now();
  if(animId) cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
  updateHUD();
}

function updateHUD(){document.getElementById('sd').textContent=Math.floor(score);}

function loop(ts){
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  if(gameState==='playing'){update(dt);draw();}
  animId=requestAnimationFrame(loop);
}

function update(dt){
  dist+=speed*dt;
  score=dist/10;
  speed=220+dist/300;
  spawnTimer-=dt;
  if(spawnTimer<=0){spawnObstacle();spawnTimer=0.8+Math.random()*0.8-Math.min(0.4,dist/3000);}
  // Player physics
  player.vy+=GRAVITY*dt;
  player.y+=player.vy*dt;
  if(player.y>=GROUND){player.y=GROUND;player.vy=0;player.onGround=true;player.jumps=0;}
  player.frame+=dt*8;
  // Obstacles
  obstacles=obstacles.filter(o=>{o.x-=speed*dt;return o.x+o.w>-10;});
  // BG parallax
  bgLayers.forEach(l=>{l.objs.forEach(o=>{o.x-=speed*l.speed*dt;if(o.x+o.w<0) o.x=W+Math.random()*50;});});
  // Collision
  for(const o of obstacles){
    if(player.x+player.w-6>o.x&&player.x+6<o.x+o.w&&player.y+player.h-4>o.y&&player.y<o.y+o.h){die();return;}
  }
  // Particles
  particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=400*dt;p.life-=dt;return p.life>0;});
  updateHUD();
}

function spawnObstacle(){
  const t=Math.random();
  if(t<0.5){// Ground spike
    const w=20+Math.random()*15;
    const h=24+Math.random()*16;
    obstacles.push({x:W+10,y:GROUND+30-h,w,h,type:'spike'});
  } else if(t<0.75){// Low barrier
    obstacles.push({x:W+10,y:GROUND-10,w:18,h:40,type:'barrier'});
  } else{// High floating barrier
    const h=30+Math.random()*20;
    obstacles.push({x:W+10,y:GROUND-80-Math.random()*40,w:16,h,type:'high'});
  }
}

function tryJump(){
  if(gameState!=='playing') return;
  if(player.jumps<2){player.vy=JUMP_V;player.onGround=false;player.jumps++;for(let i=0;i<5;i++) particles.push({x:player.x+player.w/2,y:player.y+player.h,vx:(Math.random()-.5)*60,vy:20+Math.random()*40,life:.3,color:'#6c63ff'});}
}

function die(){
  gameState='over';
  for(let i=0;i<15;i++) particles.push({x:player.x+player.w/2,y:player.y+player.h/2,vx:(Math.random()-.5)*200,vy:(Math.random()-.5)*200,life:.6,color:'#6c63ff'});
  const s=Math.floor(score);
  if(s>hs){hs=s;try{localStorage.setItem('er_hs',hs);}catch(e){}document.getElementById('hd').textContent=hs;}
  document.getElementById('mt').textContent='Game Over';
  document.getElementById('mp').textContent='Score: '+s+'\nBest: '+hs;
  document.querySelector('#msg button').textContent='Try Again';
  setTimeout(()=>{document.getElementById('msg').style.display='block';},600);
}

function draw(){
  // Sky gradient
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0a1a');grad.addColorStop(.7,'#1a0a3a');grad.addColorStop(1,'#0d0d14');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // Stars
  ctx.fillStyle='rgba(255,255,255,.6)';
  for(let i=0;i<30;i++){const sx=(i*137+dist*.05)%W,sy=10+i*6%60;ctx.fillRect(sx,sy,1,1);}
  // BG buildings
  bgLayers.forEach(l=>{
    l.objs.forEach(o=>{
      ctx.fillStyle=l.color;
      ctx.fillRect(o.x,H-80-o.h,o.w,o.h+80);
      // Windows
      ctx.fillStyle='rgba(255,220,100,.15)';
      for(let wy=H-80-o.h+6;wy<H-80-6;wy+=10) for(let wx=o.x+4;wx<o.x+o.w-4;wx+=8) if(Math.random()>.4) ctx.fillRect(wx,wy,4,5);
    });
  });
  // Ground
  ctx.fillStyle='#1a2a1a';ctx.fillRect(0,GROUND+30,W,H-GROUND-30);
  ctx.fillStyle='#2a4a2a';ctx.fillRect(0,GROUND+28,W,4);
  // Ground dashes (speed indicator)
  ctx.fillStyle='rgba(255,255,255,.15)';
  const dashOffset=dist%60;
  for(let x=-dashOffset;x<W;x+=60) ctx.fillRect(x,GROUND+30+8,30,3);
  // Obstacles
  obstacles.forEach(o=>{
    if(o.type==='spike'){
      ctx.fillStyle='#cc3333';
      const n=Math.ceil(o.w/12);
      for(let i=0;i<n;i++){ctx.beginPath();ctx.moveTo(o.x+i*12,o.y+o.h);ctx.lineTo(o.x+i*12+6,o.y);ctx.lineTo(o.x+i*12+12,o.y+o.h);ctx.closePath();ctx.fill();}
    } else{
      ctx.fillStyle=o.type==='high'?'#9b59b6':'#e67e22';
      ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,4);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(o.x+3,o.y+3,o.w-6,5);
    }
  });
  // Player
  if(gameState==='playing'||particles.length>0){
    const px=player.x,py=player.y;
    // Body
    ctx.fillStyle='#6c63ff';ctx.beginPath();ctx.roundRect(px,py,player.w,player.h,5);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';ctx.fillRect(px+14,py+6,7,7);ctx.fillStyle='#111';ctx.fillRect(px+16,py+8,4,4);
    // Running legs
    const lf=player.onGround?Math.sin(dist*.15)*8:0;
    ctx.fillStyle='#5550cc';
    ctx.beginPath();ctx.roundRect(px+2,py+player.h,9,8+lf,3);ctx.fill();
    ctx.beginPath();ctx.roundRect(px+player.w-11,py+player.h,9,8-lf,3);ctx.fill();
    // Trail
    if(!player.onGround){ctx.fillStyle='rgba(108,99,255,.3)';ctx.beginPath();ctx.roundRect(px-12,py+4,12,player.h-8,3);ctx.fill();}
  }
  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life*2;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  // Score
  ctx.fillStyle='#e8e8f0';ctx.font='bold 16px Segoe UI';ctx.textAlign='left';ctx.fillText('Score: '+Math.floor(score),8,22);
  ctx.fillStyle='#9898b8';ctx.font='12px Segoe UI';ctx.fillText('Speed: '+Math.floor(speed/22),8,38);
}

document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();tryJump();}});
C.addEventListener('click',tryJump);
C.addEventListener('touchstart',e=>{e.preventDefault();tryJump();},{passive:false});

document.getElementById('msg').style.display='block';gameState='idle';
</script>
</body>
</html>
