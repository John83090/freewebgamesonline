<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Free Flow - Pipe Puzzle</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d14;
    --surface: #13131f;
    --surface2: #1a1a2e;
    --border: #2a2a45;
    --accent: #6c63ff;
    --accent2: #a89cff;
    --text: #e8e8f0;
    --text-dim: #9090b0;
    --success: #4caf82;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  #topbar a {
    color: var(--accent2);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: color .2s;
  }
  #topbar a:hover { color: var(--accent); }

  #topbar-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .5px;
    flex: 1;
    text-align: center;
  }

  #topbar-spacer { width: 80px; }

  /* ── SCREENS ── */
  .screen {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .screen.active { display: flex; }

  /* ── LEVEL SELECT ── */
  #level-select-screen {
    padding: 20px 16px 40px;
    align-items: center;
  }

  #level-select-screen h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 6px;
  }

  #level-select-screen p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  #level-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 480px;
  }

  .level-btn {
    aspect-ratio: 1;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .1s;
    position: relative;
    gap: 2px;
  }
  .level-btn:active { transform: scale(.93); }
  .level-btn:hover { border-color: var(--accent); background: #1e1e35; }

  .level-btn .lnum {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .level-btn .lsize {
    font-size: 10px;
    color: var(--text-dim);
  }
  .level-btn.done {
    border-color: var(--success);
    background: #0d2318;
  }
  .level-btn.done .lnum { color: var(--success); }
  .level-btn .checkmark {
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 12px;
    color: var(--success);
  }

  /* ── GAME SCREEN ── */
  #game-screen { align-items: center; padding-bottom: 20px; }

  #game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 520px;
    padding: 12px 16px 8px;
    gap: 8px;
    flex-shrink: 0;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 14px;
    text-align: center;
    min-width: 70px;
  }
  .stat-box .label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .stat-box .value {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  #btn-back-select {
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--accent2);
    font-size: 13px;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  #btn-back-select:hover { border-color: var(--accent); color: var(--accent); }

  #canvas-wrap {
    position: relative;
    flex-shrink: 0;
    touch-action: none;
  }

  #game-canvas {
    display: block;
    touch-action: none;
    cursor: crosshair;
  }

  #game-footer {
    display: flex;
    gap: 10px;
    padding: 10px 16px 0;
    width: 100%;
    max-width: 520px;
    flex-shrink: 0;
  }

  .footer-btn {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, border-color .2s;
  }
  .footer-btn:hover { background: #1e1e35; border-color: var(--accent); }
  .footer-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .footer-btn.primary:hover { background: #5a52e0; }

  /* ── WIN OVERLAY ── */
  #win-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,13,20,.88);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    z-index: 20;
    gap: 14px;
    backdrop-filter: blur(4px);
  }
  #win-overlay.show { display: flex; }

  #win-overlay h2 {
    font-size: 30px;
    font-weight: 800;
    color: var(--success);
    letter-spacing: 1px;
  }
  #win-overlay p {
    font-size: 15px;
    color: var(--text-dim);
  }
  .win-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .win-btn {
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .win-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .win-btn:hover { filter: brightness(1.15); }

  /* ── PROGRESS BAR ── */
  #progress-bar-wrap {
    width: 100%;
    max-width: 520px;
    padding: 0 16px;
    margin-top: 6px;
    flex-shrink: 0;
  }
  #progress-track {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    border-radius: 3px;
    transition: width .3s ease;
    width: 0%;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <a href="/index.html" target="_top">&#8592; All Games</a>
  <div id="topbar-title">Free Flow</div>
  <div id="topbar-spacer"></div>
</div>
<script>if(window!==window.top)document.getElementById('topbar').style.display='none';</script>

<!-- LEVEL SELECT SCREEN -->
<div id="level-select-screen" class="screen active">
  <h2>Select Level</h2>
  <p>Connect matching dots and fill the grid!</p>
  <div id="level-grid"></div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div id="game-header">
    <button id="btn-back-select">&#9776; Levels</button>
    <div class="stat-box">
      <div class="label">Level</div>
      <div class="value" id="stat-level">1</div>
    </div>
    <div class="stat-box">
      <div class="label">Moves</div>
      <div class="value" id="stat-moves">0</div>
    </div>
    <div class="stat-box">
      <div class="label">Filled</div>
      <div class="value" id="stat-pct">0%</div>
    </div>
  </div>

  <div id="progress-bar-wrap">
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="win-overlay">
      <h2>Solved!</h2>
      <p id="win-msg">Level complete!</p>
      <div class="win-btns">
        <button class="win-btn" onclick="Game.restart()">Retry</button>
        <button class="win-btn" onclick="showLevelSelect()">Levels</button>
        <button class="win-btn primary" id="btn-next-level">Next Level &#8594;</button>
      </div>
    </div>
  </div>

  <div id="game-footer">
    <button class="footer-btn" onclick="Game.restart()">&#8635; Restart</button>
    <button class="footer-btn" onclick="Game.undo()">&#8617; Undo</button>
  </div>
</div>

<script>
'use strict';

/* ============================================================
   LEVEL DATA
   Each level: { size, dots: [[r,c,colorIdx], ...] }
   Dots come in pairs sharing same colorIdx.
============================================================ */
const COLORS = {
  red:    '#e84545',
  blue:   '#4488ff',
  green:  '#44cc77',
  yellow: '#f5c518',
  orange: '#ff7733',
  maroon: '#c0392b',
  pink:   '#ff66b3',
  purple: '#9b59b6',
  cyan:   '#22dddd',
  lime:   '#aaee00',
  white:  '#e0e0e0',
};

const COLOR_KEYS = Object.keys(COLORS);
const COLOR_VALS = Object.values(COLORS);

// colorIdx maps to COLOR_VALS
function col(name) { return COLOR_KEYS.indexOf(name); }

const LEVELS = [
  // Level 1 — 5×5, 3 colors
  { size: 5, dots: [
    [0,0,col('red')], [3,4,col('red')],
    [1,3,col('green')], [4,2,col('green')],
    [2,3,col('blue')], [4,4,col('blue')],
  ]},
  // Level 2 — 5×5, 4 colors
  { size: 5, dots: [
    [0,0,col('red')], [4,4,col('red')],
    [0,1,col('green')], [3,4,col('green')],
    [1,1,col('blue')], [3,3,col('blue')],
    [1,2,col('yellow')], [2,2,col('yellow')],
  ]},
  // Level 3 — 5×5, 5 colors
  { size: 5, dots: [
    [0,0,col('red')], [0,4,col('red')],
    [1,0,col('blue')], [4,1,col('blue')],
    [1,1,col('yellow')], [3,1,col('yellow')],
    [3,4,col('green')], [2,3,col('green')],
    [4,4,col('orange')], [3,3,col('orange')],
  ]},
  // Level 4 — 6×6, 4 colors
  { size: 6, dots: [
    [0,0,col('red')], [2,2,col('red')],
    [0,3,col('blue')], [2,5,col('blue')],
    [3,0,col('green')], [5,2,col('green')],
    [3,3,col('yellow')], [5,5,col('yellow')],
  ]},
  // Level 5 — 6×6, 5 colors
  { size: 6, dots: [
    [0,0,col('red')], [5,4,col('red')],
    [0,5,col('green')], [5,5,col('green')],
    [1,0,col('yellow')], [3,2,col('yellow')],
    [2,2,col('blue')], [4,3,col('blue')],
    [4,0,col('orange')], [5,3,col('orange')],
  ]},
  // Level 6 — 6×6, 6 colors
  { size: 6, dots: [
    [0,0,col('red')], [0,5,col('red')],
    [5,0,col('blue')], [5,5,col('blue')],
    [1,0,col('green')], [4,2,col('green')],
    [1,5,col('yellow')], [4,3,col('yellow')],
    [1,1,col('orange')], [3,4,col('orange')],
    [2,1,col('maroon')], [3,1,col('maroon')],
  ]},
  // Level 7 — 7×7, 6 colors
  { size: 7, dots: [
    [0,0,col('red')], [0,6,col('red')],
    [6,0,col('blue')], [6,6,col('blue')],
    [1,0,col('green')], [5,4,col('green')],
    [1,1,col('yellow')], [5,6,col('yellow')],
    [2,1,col('orange')], [5,5,col('orange')],
    [3,1,col('maroon')], [4,1,col('maroon')],
  ]},
  // Level 8 — 7×7, 7 colors
  { size: 7, dots: [
    [0,0,col('red')], [0,6,col('red')],
    [1,6,col('green')], [1,0,col('green')],
    [2,0,col('blue')], [2,6,col('blue')],
    [3,6,col('orange')], [3,0,col('orange')],
    [4,0,col('yellow')], [4,6,col('yellow')],
    [5,6,col('pink')], [5,0,col('pink')],
    [6,0,col('maroon')], [6,6,col('maroon')],
  ]},
  // Level 9 — 7×7, 7 colors
  { size: 7, dots: [
    [0,6,col('red')], [1,0,col('red')],
    [1,6,col('blue')], [6,4,col('blue')],
    [6,3,col('yellow')], [2,0,col('yellow')],
    [1,1,col('green')], [3,5,col('green')],
    [4,5,col('orange')], [5,1,col('orange')],
    [4,1,col('maroon')], [3,3,col('maroon')],
    [2,4,col('pink')], [3,2,col('pink')],
  ]},
  // Level 10 — 8×8, 6 colors
  { size: 8, dots: [
    [0,0,col('red')], [1,0,col('red')],
    [0,4,col('blue')], [1,4,col('blue')],
    [2,0,col('green')], [3,0,col('green')],
    [2,4,col('yellow')], [3,4,col('yellow')],
    [4,0,col('orange')], [7,0,col('orange')],
    [4,4,col('maroon')], [7,4,col('maroon')],
  ]},
  // Level 11 — 8×8, 7 colors
  { size: 8, dots: [
    [0,0,col('red')], [2,7,col('red')],
    [3,7,col('blue')], [7,3,col('blue')],
    [7,2,col('yellow')], [1,0,col('yellow')],
    [1,1,col('green')], [4,6,col('green')],
    [5,6,col('orange')], [4,1,col('orange')],
    [2,1,col('maroon')], [5,4,col('maroon')],
    [3,1,col('pink')], [5,3,col('pink')],
  ]},
  // Level 12 — 8×8, 8 colors
  { size: 8, dots: [
    [0,0,col('red')], [1,0,col('red')],
    [0,4,col('blue')], [1,4,col('blue')],
    [2,0,col('green')], [3,0,col('green')],
    [2,4,col('yellow')], [3,4,col('yellow')],
    [4,0,col('orange')], [5,0,col('orange')],
    [4,4,col('maroon')], [5,4,col('maroon')],
    [6,0,col('pink')], [7,0,col('pink')],
    [6,4,col('purple')], [7,4,col('purple')],
  ]},
  // Level 13 — 9×9, 7 colors
  { size: 9, dots: [
    [0,0,col('red')], [2,8,col('red')],
    [3,8,col('blue')], [8,3,col('blue')],
    [8,2,col('yellow')], [1,0,col('yellow')],
    [1,1,col('green')], [6,7,col('green')],
    [2,1,col('orange')], [7,7,col('orange')],
    [2,2,col('maroon')], [6,3,col('maroon')],
    [6,2,col('pink')], [4,4,col('pink')],
  ]},
  // Level 14 — 9×9, 8 colors
  { size: 9, dots: [
    [0,0,col('red')], [2,8,col('red')],
    [3,8,col('blue')], [8,3,col('blue')],
    [8,2,col('yellow')], [1,0,col('yellow')],
    [1,1,col('green')], [4,7,col('green')],
    [2,1,col('orange')], [7,5,col('orange')],
    [2,2,col('maroon')], [6,7,col('maroon')],
    [7,7,col('pink')], [3,2,col('pink')],
    [3,3,col('purple')], [4,4,col('purple')],
  ]},
  // Level 15 — 9×9, 9 colors
  { size: 9, dots: [
    [0,0,col('red')], [0,8,col('red')],
    [1,8,col('blue')], [1,0,col('blue')],
    [2,0,col('green')], [2,8,col('green')],
    [3,8,col('yellow')], [3,0,col('yellow')],
    [4,0,col('orange')], [4,8,col('orange')],
    [5,8,col('maroon')], [5,0,col('maroon')],
    [6,0,col('pink')], [6,8,col('pink')],
    [7,8,col('purple')], [7,0,col('purple')],
    [8,0,col('cyan')], [8,8,col('cyan')],
  ]},
];

/* ============================================================
   STORAGE
============================================================ */
const STORAGE_KEY = 'fwgo_freeflow_progress';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveProgress(p) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch {}
}

let progress = loadProgress();

/* ============================================================
   LEVEL SELECT
============================================================ */
function buildLevelSelect() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const btn = document.createElement('div');
    btn.className = 'level-btn' + (progress[i] ? ' done' : '');
    btn.innerHTML = `
      ${progress[i] ? '<span class="checkmark">&#10003;</span>' : ''}
      <span class="lnum">${i + 1}</span>
      <span class="lsize">${lv.size}&#xd7;${lv.size}</span>
    `;
    btn.addEventListener('click', () => Game.startLevel(i));
    grid.appendChild(btn);
  });
}

function showLevelSelect() {
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('level-select-screen').classList.add('active');
  document.getElementById('game-screen').classList.remove('active');
  buildLevelSelect();
}

function showGameScreen() {
  document.getElementById('level-select-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
}

/* ============================================================
   GAME ENGINE
============================================================ */
const Game = (() => {
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const winOverlay = document.getElementById('win-overlay');

  let levelIdx = 0;
  let levelData = null;
  let size = 0;
  let cellSize = 0;
  let PAD = 0;

  // State
  let pipes = [];        // pipes[colorIdx] = [[r,c], ...]
  let grid = [];         // grid[r][c] = colorIdx or -1
  let dotMap = {};       // "r,c" -> colorIdx
  let dotPairs = [];     // dotPairs[colorIdx] = [[r,c],[r,c]]
  let moves = 0;
  let history = [];      // for undo

  // Drawing state
  let dragging = false;
  let dragColor = -1;
  let dragPath = [];
  let lastCell = null;

  function key(r, c) { return r + ',' + c; }

  function initLevel(idx) {
    levelIdx = idx;
    levelData = LEVELS[idx];
    size = levelData.size;
    moves = 0;
    history = [];
    winOverlay.classList.remove('show');

    // Build dotMap and dotPairs
    dotMap = {};
    dotPairs = {};
    levelData.dots.forEach(([r, c, ci]) => {
      dotMap[key(r, c)] = ci;
      if (!dotPairs[ci]) dotPairs[ci] = [];
      dotPairs[ci].push([r, c]);
    });

    // Init pipes and grid
    pipes = {};
    for (const ci in dotPairs) { pipes[ci] = []; }
    grid = Array.from({length: size}, () => new Array(size).fill(-1));

    updateCanvas();
    updateStats();
  }

  function getColorIndices() {
    return Object.keys(dotPairs).map(Number);
  }

  function isEndpoint(r, c) {
    return key(r, c) in dotMap;
  }

  function getEndpointColor(r, c) {
    return dotMap[key(r, c)] ?? -1;
  }

  /* ─── Canvas sizing ─── */
  function resize() {
    const wrap = document.getElementById('canvas-wrap');
    const maxW = Math.min(window.innerWidth - 8, 520);
    const maxH = window.innerHeight - 220;
    const dim = Math.min(maxW, maxH);
    PAD = Math.max(8, Math.floor(dim * 0.03));
    cellSize = Math.floor((dim - PAD * 2) / size);
    const actual = cellSize * size + PAD * 2;
    canvas.width = actual;
    canvas.height = actual;
    wrap.style.width = actual + 'px';
    wrap.style.height = actual + 'px';
    canvas.style.width = actual + 'px';
    canvas.style.height = actual + 'px';
    draw();
  }

  function cellFromXY(x, y) {
    const c = Math.floor((x - PAD) / cellSize);
    const r = Math.floor((y - PAD) / cellSize);
    if (r < 0 || r >= size || c < 0 || c >= size) return null;
    return {r, c};
  }

  function centerOf(r, c) {
    return {
      x: PAD + c * cellSize + cellSize / 2,
      y: PAD + r * cellSize + cellSize / 2
    };
  }

  /* ─── Draw ─── */
  function draw() {
    const W = canvas.width;
    const H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#13131f';
    roundRect(ctx, 0, 0, W, H, 16);
    ctx.fill();

    // Grid lines
    ctx.strokeStyle = '#2a2a45';
    ctx.lineWidth = 1;
    for (let r = 0; r <= size; r++) {
      const y = PAD + r * cellSize;
      ctx.beginPath(); ctx.moveTo(PAD, y); ctx.lineTo(PAD + size * cellSize, y); ctx.stroke();
    }
    for (let c = 0; c <= size; c++) {
      const x = PAD + c * cellSize;
      ctx.beginPath(); ctx.moveTo(x, PAD); ctx.lineTo(x, PAD + size * cellSize); ctx.stroke();
    }

    const lineW = Math.max(4, cellSize * 0.38);
    const dotR = Math.max(7, cellSize * 0.28);

    // Draw completed pipes
    for (const ciStr in pipes) {
      const ci = Number(ciStr);
      const path = pipes[ci];
      if (path.length < 2) continue;
      drawPipePath(path, COLOR_VALS[ci], lineW);
    }

    // Draw active drag pipe
    if (dragging && dragPath.length >= 2) {
      drawPipePath(dragPath, COLOR_VALS[dragColor], lineW, true);
    }

    // Draw dots (on top of pipes)
    for (const [r, c, ci] of levelData.dots) {
      const {x, y} = centerOf(r, c);
      // Outer circle
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fillStyle = COLOR_VALS[ci];
      ctx.fill();
      // Inner highlight
      ctx.beginPath();
      ctx.arc(x - dotR * 0.2, y - dotR * 0.2, dotR * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
      // Border
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  function drawPipePath(path, color, lineW, isDrag = false) {
    if (path.length < 2) return;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    if (isDrag) ctx.globalAlpha = 0.82;
    ctx.beginPath();
    const {x: sx, y: sy} = centerOf(path[0][0], path[0][1]);
    ctx.moveTo(sx, sy);
    for (let i = 1; i < path.length; i++) {
      const {x, y} = centerOf(path[i][0], path[i][1]);
      ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  /* ─── Stats ─── */
  function updateStats() {
    document.getElementById('stat-level').textContent = levelIdx + 1;
    document.getElementById('stat-moves').textContent = moves;
    const filled = countFilled();
    const total = size * size;
    const pct = Math.round(filled / total * 100);
    document.getElementById('stat-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function countFilled() {
    let n = 0;
    for (let r = 0; r < size; r++)
      for (let c = 0; c < size; c++)
        if (grid[r][c] !== -1) n++;
    return n;
  }

  function isComplete() {
    const total = size * size;
    if (countFilled() < total) return false;
    // All pipes must connect their endpoints
    for (const ciStr in dotPairs) {
      const ci = Number(ciStr);
      const [a, b] = dotPairs[ci];
      const path = pipes[ci];
      if (path.length < 2) return false;
      const first = path[0], last = path[path.length - 1];
      const connectsAB =
        (first[0]===a[0]&&first[1]===a[1]&&last[0]===b[0]&&last[1]===b[1]) ||
        (first[0]===b[0]&&first[1]===b[1]&&last[0]===a[0]&&last[1]===a[1]);
      if (!connectsAB) return false;
    }
    return true;
  }

  /* ─── Grid management ─── */
  function rebuildGrid() {
    grid = Array.from({length: size}, () => new Array(size).fill(-1));
    for (const ciStr in pipes) {
      const ci = Number(ciStr);
      for (const [r, c] of pipes[ci]) {
        grid[r][c] = ci;
      }
    }
  }

  /* ─── Input handling ─── */
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if (e.touches) {
      const t = e.touches[0];
      return { x: (t.clientX - rect.left) * scaleX, y: (t.clientY - rect.top) * scaleY };
    }
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
  }

  function onStart(e) {
    e.preventDefault();
    const {x, y} = getPos(e);
    const cell = cellFromXY(x, y);
    if (!cell) return;
    const {r, c} = cell;

    // Check if starting from a dot
    const epColor = getEndpointColor(r, c);
    if (epColor !== -1) {
      // Save history
      history.push(deepCopy());
      dragColor = epColor;
      // Clear existing pipe for this color
      clearPipe(epColor);
      dragPath = [[r, c]];
      dragging = true;
      lastCell = {r, c};
      draw();
      return;
    }

    // Check if starting from an existing pipe (to erase from that point)
    if (grid[r][c] !== -1) {
      const ci = grid[r][c];
      // Only allow re-drawing from a non-endpoint cell if it's on a pipe
      const path = pipes[ci];
      const idx = path.findIndex(([pr, pc]) => pr === r && pc === c);
      if (idx !== -1 && idx > 0 && idx < path.length - 1) {
        history.push(deepCopy());
        dragColor = ci;
        // Truncate pipe up to idx
        const truncated = path.slice(0, idx + 1);
        // Clear grid for removed cells
        for (let i = idx + 1; i < path.length; i++) {
          grid[path[i][0]][path[i][1]] = -1;
        }
        pipes[ci] = truncated;
        dragPath = [...truncated];
        dragging = true;
        lastCell = {r, c};
        draw();
        return;
      }
    }
  }

  function onMove(e) {
    e.preventDefault();
    if (!dragging) return;
    const {x, y} = getPos(e);
    const cell = cellFromXY(x, y);
    if (!cell) return;
    const {r, c} = cell;
    if (lastCell && lastCell.r === r && lastCell.c === c) return;

    // Must be adjacent to last cell
    const lc = lastCell;
    if (!lc) return;
    const dr = Math.abs(r - lc.r), dc = Math.abs(c - lc.c);
    if (dr + dc !== 1) {
      // Not adjacent — skip (smooth drag handles this)
      return;
    }

    lastCell = {r, c};

    // Check if going back (erase last segment)
    if (dragPath.length >= 2) {
      const prev = dragPath[dragPath.length - 2];
      if (prev[0] === r && prev[1] === c) {
        const removed = dragPath.pop();
        grid[removed[0]][removed[1]] = -1;
        draw();
        updateStats();
        return;
      }
    }

    // Check if cell is occupied by another color's endpoint — block
    const epColor = getEndpointColor(r, c);
    if (epColor !== -1 && epColor !== dragColor) return;

    // Check if cell is occupied by same color (loop avoidance)
    const alreadyIdx = dragPath.findIndex(([pr, pc]) => pr === r && pc === c);
    if (alreadyIdx !== -1) {
      // Truncate to that point
      const removed = dragPath.splice(alreadyIdx + 1);
      for (const [rr, rc] of removed) grid[rr][rc] = -1;
      draw();
      updateStats();
      return;
    }

    // Check if cell occupied by different color pipe — erase that pipe
    if (grid[r][c] !== -1 && grid[r][c] !== dragColor) {
      clearPipe(grid[r][c]);
    }

    // If landing on own other endpoint — complete!
    if (epColor === dragColor) {
      dragPath.push([r, c]);
      grid[r][c] = dragColor;
      commitDrag();
      return;
    }

    dragPath.push([r, c]);
    grid[r][c] = dragColor;
    draw();
    updateStats();
  }

  function onEnd(e) {
    e.preventDefault();
    if (!dragging) return;
    commitDrag();
  }

  function commitDrag() {
    dragging = false;
    if (dragPath.length > 0) {
      pipes[dragColor] = [...dragPath];
      rebuildGrid();
      moves++;
      updateStats();
    }
    dragPath = [];
    dragColor = -1;
    lastCell = null;
    draw();
    checkWin();
  }

  function clearPipe(ci) {
    if (!pipes[ci]) return;
    for (const [r, c] of pipes[ci]) {
      grid[r][c] = -1;
    }
    pipes[ci] = [];
  }

  function checkWin() {
    if (isComplete()) {
      progress[levelIdx] = true;
      saveProgress(progress);
      const nextBtn = document.getElementById('btn-next-level');
      if (levelIdx + 1 < LEVELS.length) {
        nextBtn.style.display = '';
        nextBtn.onclick = () => startLevel(levelIdx + 1);
      } else {
        nextBtn.style.display = 'none';
      }
      document.getElementById('win-msg').textContent =
        `Level ${levelIdx + 1} complete! Moves: ${moves}`;
      winOverlay.classList.add('show');
    }
  }

  /* ─── Deep copy for undo ─── */
  function deepCopy() {
    const pCopy = {};
    for (const ci in pipes) pCopy[ci] = pipes[ci].map(([r,c]) => [r,c]);
    const gCopy = grid.map(row => [...row]);
    return { pipes: pCopy, grid: gCopy, moves };
  }

  function restoreState(state) {
    pipes = {};
    for (const ci in state.pipes) pipes[ci] = state.pipes[ci].map(([r,c]) => [r,c]);
    grid = state.grid.map(row => [...row]);
    moves = state.moves;
  }

  /* ─── Public API ─── */
  function startLevel(idx) {
    showGameScreen();
    initLevel(idx);
    resize();
  }

  function restart() {
    winOverlay.classList.remove('show');
    initLevel(levelIdx);
    draw();
  }

  function undo() {
    if (history.length === 0) return;
    const state = history.pop();
    restoreState(state);
    draw();
    updateStats();
  }

  function updateCanvas() {
    resize();
  }

  /* ─── Event binding ─── */
  canvas.addEventListener('mousedown', onStart);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onEnd);
  canvas.addEventListener('mouseleave', onEnd);
  canvas.addEventListener('touchstart', onStart, {passive: false});
  canvas.addEventListener('touchmove', onMove, {passive: false});
  canvas.addEventListener('touchend', onEnd, {passive: false});
  canvas.addEventListener('touchcancel', onEnd, {passive: false});

  window.addEventListener('resize', () => {
    if (levelData) resize();
  });

  document.getElementById('btn-back-select').addEventListener('click', showLevelSelect);

  return { startLevel, restart, undo };
})();

/* ============================================================
   INIT
============================================================ */
buildLevelSelect();
</script>
</body>
</html>
