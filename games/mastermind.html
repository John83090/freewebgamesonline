<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mastermind – FreeWebGamesOnline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
#topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 18px;display:flex;align-items:center;gap:14px}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}#topbar a:hover{color:#6c63ff}
#topbar h1{font-size:18px;flex:1}
#score-badge{background:#6c63ff;color:#fff;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700}
#main{display:flex;flex-direction:column;align-items:center;padding:16px;gap:14px}
#board{display:flex;flex-direction:column;gap:6px;max-height:420px;overflow-y:auto}
.row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#1e1e30;border:1px solid #2a2a45;border-radius:10px}
.row.active{border-color:#6c63ff}
.peg{width:38px;height:38px;border-radius:50%;border:2px solid #2a2a45;cursor:pointer;transition:.1s;flex-shrink:0}
.peg.empty{background:#0d0d14}
.peg:hover{transform:scale(1.1)}
.feedback{display:grid;grid-template-columns:repeat(2,14px);gap:3px;margin-left:6px}
.fb-dot{width:14px;height:14px;border-radius:50%;background:#2a2a45}
.fb-dot.black{background:#e8e8f0}
.fb-dot.white{background:#6c63ff}
#palette{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.color-btn{width:44px;height:44px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.color-btn:hover,.color-btn.sel{border-color:#fff;transform:scale(1.15)}
#active-guess{display:flex;gap:10px;align-items:center;justify-content:center}
#active-guess .peg{width:48px;height:48px;cursor:pointer}
#secret-row{display:flex;gap:10px;align-items:center;justify-content:center}
.secret-peg{width:44px;height:44px;border-radius:50%;border:2px solid #2a2a45}
#message{font-size:18px;font-weight:700;min-height:28px;color:#6c63ff;text-align:center}
button.action{background:#6c63ff;color:#fff;border:none;padding:9px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
button.action:hover{background:#574fd6}
.row-num{font-size:12px;color:#9898b8;width:20px;text-align:center}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <h1>&#129504; Mastermind</h1>
  <span id="score-badge">Row 1/10</span>
</div>
<div id="main">
  <div style="font-size:13px;color:#9898b8;text-align:center">Guess the 4-color secret code. Black peg = right color &amp; position. Purple peg = right color, wrong position.</div>
  <div id="palette"></div>
  <div style="font-size:12px;color:#9898b8">Selected color: <b id="sel-name">—</b></div>
  <div id="active-guess"></div>
  <button class="action" onclick="submitGuess()" id="submit-btn">Submit Guess</button>
  <div id="board"></div>
  <div id="message"></div>
  <div id="secret-row" style="display:none">
    <span style="color:#9898b8;font-size:13px">Secret was:</span>
  </div>
  <button class="action" onclick="newGame()">New Game</button>
</div>
<script>
const COLORS=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6'];
const CNAMES=['Red','Orange','Yellow','Green','Blue','Purple'];
let secret=[],currentGuess=[null,null,null,null],selectedColor=0,rowNum=0,gameOver=false;

document.getElementById('palette').innerHTML=COLORS.map((c,i)=>`<div class="color-btn" style="background:${c}" onclick="selectColor(${i})" title="${CNAMES[i]}"></div>`).join('');

function selectColor(i){
  selectedColor=i;
  document.querySelectorAll('.color-btn').forEach((b,j)=>b.classList.toggle('sel',j===i));
  document.getElementById('sel-name').textContent=CNAMES[i];
}

function setSlot(slot){
  if(gameOver)return;
  currentGuess[slot]=selectedColor;
  renderActive();
}

function renderActive(){
  const el=document.getElementById('active-guess');
  el.innerHTML=currentGuess.map((c,i)=>`<div class="peg" style="background:${c!==null?COLORS[c]:'#0d0d14'}" onclick="setSlot(${i})"></div>`).join('');
}

function submitGuess(){
  if(gameOver)return;
  if(currentGuess.some(c=>c===null)){document.getElementById('message').textContent='Fill all 4 slots first!';return;}
  const guess=[...currentGuess];
  const {black,white}=score(guess,secret);
  addRow(guess,black,white);
  rowNum++;
  document.getElementById('score-badge').textContent='Row '+(rowNum+1)+'/10';
  if(black===4){endGame(true);}
  else if(rowNum>=10){endGame(false);}
  else{currentGuess=[null,null,null,null];renderActive();document.getElementById('message').textContent='';}
}

function score(guess,sec){
  let black=0,white=0;
  const gUsed=Array(4).fill(false),sUsed=Array(4).fill(false);
  guess.forEach((c,i)=>{if(c===sec[i]){black++;gUsed[i]=sUsed[i]=true;}});
  guess.forEach((c,i)=>{if(gUsed[i])return;sec.forEach((sc,j)=>{if(!sUsed[j]&&!gUsed[i]&&c===sc){white++;sUsed[j]=gUsed[i]=true;}});});
  return{black,white};
}

function addRow(guess,black,white){
  const board=document.getElementById('board');
  const div=document.createElement('div');div.className='row';
  div.innerHTML='<span class="row-num">'+(rowNum+1)+'</span>'+
    guess.map(c=>`<div class="peg" style="background:${COLORS[c]}"></div>`).join('')+
    '<div class="feedback">'+
    Array(black).fill('<div class="fb-dot black"></div>').join('')+
    Array(white).fill('<div class="fb-dot white"></div>').join('')+
    Array(4-black-white).fill('<div class="fb-dot"></div>').join('')+
    '</div>';
  board.insertBefore(div,board.firstChild);
}

function endGame(won){
  gameOver=true;
  document.getElementById('submit-btn').disabled=true;
  if(won)document.getElementById('message').textContent='You cracked the code!';
  else document.getElementById('message').textContent='Game over! The code was:';
  document.getElementById('message').style.color=won?'#2ecc71':'#e74c3c';
  const sr=document.getElementById('secret-row');sr.style.display='flex';
  sr.innerHTML='<span style="color:#9898b8;font-size:13px">Secret was:</span>'+
    secret.map(c=>`<div class="secret-peg" style="background:${COLORS[c]}"></div>`).join('');
}

function newGame(){
  secret=Array.from({length:4},()=>Math.floor(Math.random()*COLORS.length));
  currentGuess=[null,null,null,null];rowNum=0;gameOver=false;selectedColor=0;
  document.getElementById('board').innerHTML='';
  document.getElementById('message').textContent='';
  document.getElementById('message').style.color='#6c63ff';
  document.getElementById('secret-row').style.display='none';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('score-badge').textContent='Row 1/10';
  selectColor(0);renderActive();
}

newGame();
</script>
</body>
</html>
