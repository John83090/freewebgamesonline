<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack Tower – FreeWebGamesOnline</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  #topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  #topbar a{color:#9898b8;text-decoration:none;font-size:20px}
  #topbar a:hover{color:#6c63ff}
  #title{flex:1;font-size:18px;font-weight:700}
  #score-badge{background:#6c63ff;color:#fff;padding:4px 14px;border-radius:20px;font-weight:700;font-size:15px}
  #game-wrap{flex:1;display:flex;justify-content:center;align-items:center;position:relative}
  canvas{display:block;touch-action:none}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(13,13,20,.85);gap:16px}
  #overlay h2{font-size:32px;color:#6c63ff}
  #overlay p{color:#9898b8;font-size:15px}
  #overlay .hs{color:#e8e8f0;font-size:18px}
  #start-btn{background:#6c63ff;color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:17px;cursor:pointer;font-weight:700}
  #start-btn:hover{background:#5a52e0}
  #mobile-btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#6c63ff;color:#fff;border:none;padding:14px 48px;border-radius:10px;font-size:18px;cursor:pointer;display:none}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <span id="title">🏗️ Stack Tower</span>
  <span id="score-badge">Score: 0</span>
</div>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h2>Stack Tower</h2>
    <p>Drop blocks to build the tallest tower!</p>
    <p>Space / Tap to drop</p>
    <div class="hs" id="hs-display"></div>
    <button id="start-btn">Play</button>
  </div>
  <button id="mobile-btn">DROP</button>
</div>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();return this};}

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay'),scoreBadge=document.getElementById('score-badge');
const hsDisplay=document.getElementById('hs-display'),mobileBtn=document.getElementById('mobile-btn');
const BLOCK_H=28,CANVAS_W=360,CANVAS_H=600,COLORS=['#6c63ff','#ff6584','#43d9ad','#f9ca24','#ff9f43','#a29bfe','#fd79a8'];
let blocks=[],current=null,score=0,hs=0,gameRunning=false,animId=null;
let camY=0,targetCamY=0;

function getHS(){try{return parseInt(localStorage.getItem('st_hs')||'0')}catch(e){return 0}}
function saveHS(s){try{localStorage.setItem('st_hs',s)}catch(e){}}

canvas.width=CANVAS_W;canvas.height=CANVAS_H;

function isMobile(){return window.innerWidth<=600}
function setupCanvas(){
  const wrap=document.getElementById('game-wrap');
  const scale=Math.min(wrap.clientWidth/CANVAS_W,(wrap.clientHeight)/CANVAS_H);
  canvas.style.width=CANVAS_W*scale+'px';canvas.style.height=CANVAS_H*scale+'px';
  if(isMobile()&&gameRunning)mobileBtn.style.display='block';
}
window.addEventListener('resize',setupCanvas);setupCanvas();

function initGame(){
  blocks=[];score=0;camY=0;targetCamY=0;
  hs=getHS();hsDisplay.textContent='Best: '+hs;
  const baseW=200;
  blocks.push({x:(CANVAS_W-baseW)/2,y:CANVAS_H-BLOCK_H-20,w:baseW,h:BLOCK_H,color:'#2a2a45'});
  spawnBlock();
}

function spawnBlock(){
  const last=blocks[blocks.length-1];
  const w=Math.max(40,last.w-(score>0?2:0));
  const y=last.y-BLOCK_H-4;
  current={x:0,y,w,h:BLOCK_H,dir:1,speed:3+score*0.15,color:COLORS[score%COLORS.length]};
}

function dropBlock(){
  if(!current||!gameRunning)return;
  const last=blocks[blocks.length-1];
  const overlapStart=Math.max(current.x,last.x);
  const overlapEnd=Math.min(current.x+current.w,last.x+last.w);
  const overlap=overlapEnd-overlapStart;
  if(overlap<=0){endGame();return;}
  blocks.push({x:overlapStart,y:current.y,w:overlap,h:BLOCK_H,color:current.color});
  score++;
  scoreBadge.textContent='Score: '+score;
  if(score>hs){hs=score;saveHS(hs);}
  targetCamY=camY-(BLOCK_H+4);
  current=null;
  setTimeout(spawnBlock,100);
}

function endGame(){
  gameRunning=false;mobileBtn.style.display='none';
  document.getElementById('overlay').querySelector('h2').textContent='Game Over!';
  document.getElementById('overlay').querySelector('p').textContent='Score: '+score;
  document.getElementById('start-btn').textContent='Play Again';
  hsDisplay.textContent='Best: '+hs;
  overlay.style.display='flex';cancelAnimationFrame(animId);
}

function draw(){
  ctx.fillStyle='#0d0d14';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  const viewY=camY;
  ctx.save();ctx.translate(0,viewY);
  blocks.forEach((b,i)=>{
    ctx.fillStyle=b.color;ctx.roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.stroke();
  });
  if(current){
    ctx.fillStyle=current.color;ctx.globalAlpha=0.9;
    ctx.roundRect(current.x,current.y,current.w,current.h,4);ctx.fill();
    ctx.globalAlpha=1;
    // ghost guide
    const last=blocks[blocks.length-1];
    const overlapStart=Math.max(current.x,last.x);
    const overlapEnd=Math.min(current.x+current.w,last.x+last.w);
    if(overlapEnd>overlapStart){
      ctx.fillStyle='rgba(255,255,255,.15)';
      ctx.fillRect(overlapStart,current.y,overlapEnd-overlapStart,BLOCK_H);
    }
  }
  ctx.restore();
  // score overlay
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(0,0,CANVAS_W,50);
  ctx.fillStyle='#e8e8f0';ctx.font='bold 22px Segoe UI';ctx.textAlign='center';
  ctx.fillText('Score: '+score,CANVAS_W/2,32);
}

function loop(){
  if(!gameRunning)return;
  if(current){
    current.x+=current.dir*current.speed;
    if(current.x+current.w>CANVAS_W){current.dir=-1;}
    if(current.x<0){current.dir=1;}
  }
  camY+=(targetCamY-camY)*0.12;
  draw();
  animId=requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click',()=>{
  overlay.style.display='none';gameRunning=true;
  initGame();mobileBtn.style.display=isMobile()?'block':'none';
  loop();
});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&gameRunning){e.preventDefault();dropBlock();}});
canvas.addEventListener('click',()=>{if(gameRunning)dropBlock();});
mobileBtn.addEventListener('click',()=>{if(gameRunning)dropBlock();});
hsDisplay.textContent='Best: '+getHS();
setupCanvas();
</script>
</body>
</html>
