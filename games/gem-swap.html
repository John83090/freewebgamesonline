<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gem Swap – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
#topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px}
#topbar a{color:#6c63ff;text-decoration:none;font-size:1.3em}
#topbar h1{font-size:1.1em;flex:1}
.badge{background:#2a2a45;border:1px solid #6c63ff;border-radius:20px;padding:4px 14px;font-size:.9em;color:#6c63ff;font-weight:bold}
#game{max-width:420px;margin:0 auto;padding:10px}
.info-bar{display:flex;gap:8px;margin-bottom:10px}
.info-box{flex:1;background:#1e1e30;border:1px solid #2a2a45;border-radius:9px;padding:8px;text-align:center}
.info-num{font-size:1.3em;font-weight:bold;color:#6c63ff}
.info-lbl{font-size:.75em;color:#9898b8}
canvas{display:block;margin:0 auto;cursor:pointer;border-radius:10px;border:2px solid #2a2a45}
.mode-row{display:flex;gap:8px;margin:10px 0}
.mode-btn{flex:1;padding:9px;background:#2a2a45;border:1px solid #3a3a55;border-radius:8px;color:#e8e8f0;cursor:pointer;font-size:.88em;transition:all .2s}
.mode-btn.active{background:#6c63ff;border-color:#6c63ff}
#status{text-align:center;padding:8px;background:#1e1e30;border:1px solid #2a2a45;border-radius:8px;font-size:.9em;margin-bottom:8px}
#newBtn{width:100%;padding:11px;background:#6c63ff;border:none;border-radius:9px;color:#fff;font-weight:bold;cursor:pointer;font-size:.95em}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <h1>💎 Gem Swap</h1>
  <span class="badge" id="hiBadge">Best: 0</span>
</div>
<div id="game">
  <div class="mode-row">
    <button class="mode-btn active" id="modeTime" onclick="setMode('time',this)">⏱ Time (90s)</button>
    <button class="mode-btn" id="modeMove" onclick="setMode('move',this)">🔢 Moves (30)</button>
  </div>
  <div class="info-bar">
    <div class="info-box"><div class="info-num" id="scoreNum">0</div><div class="info-lbl">Score</div></div>
    <div class="info-box"><div class="info-num" id="limitNum">90</div><div class="info-lbl" id="limitLbl">Seconds</div></div>
    <div class="info-box"><div class="info-num" id="chainNum">1x</div><div class="info-lbl">Chain</div></div>
  </div>
  <canvas id="c" width="384" height="384"></canvas>
  <div id="status">Select a gem to swap!</div>
  <button id="newBtn" onclick="newGame()">New Game</button>
</div>
<script>
const COLS=8,ROWS=8,SZ=48;
const GEM_COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'];
const GEM_NAMES=['Ruby','Sapphire','Emerald','Topaz','Amethyst','Aqua','Amber'];
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let grid=[],selected=null,score=0,hiScore=0,mode='time',limit=90,moves=30,animating=false,timer=null,chain=1;
try{hiScore=parseInt(localStorage.getItem('gemswap_hi'))||0;document.getElementById('hiBadge').textContent='Best: '+hiScore;}catch(e){}

function randGem(){return Math.floor(Math.random()*GEM_COLORS.length);}
function newGame(){
  clearInterval(timer);chain=1;score=0;animating=false;selected=null;
  grid=[];
  for(let r=0;r<ROWS;r++){grid.push([]);for(let c=0;c<COLS;c++)grid[r].push(randGem());}
  while(findMatches().length>0)grid=grid.map(row=>row.map(()=>randGem()));
  if(mode==='time'){limit=90;document.getElementById('limitLbl').textContent='Seconds';startTimer();}
  else{limit=30;document.getElementById('limitLbl').textContent='Moves';}
  updateUI();draw();document.getElementById('status').textContent='Select a gem to swap!';
}

function setMode(m,el){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');newGame();}

function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    limit--;document.getElementById('limitNum').textContent=limit;
    if(limit<=0){clearInterval(timer);endGame();}
  },1000);
}

function updateUI(){
  document.getElementById('scoreNum').textContent=score;
  document.getElementById('limitNum').textContent=limit;
  document.getElementById('chainNum').textContent=chain+'x';
}

function drawGem(ctx,x,y,color,selected){
  const r=SZ/2-4,cx=x+SZ/2,cy=y+SZ/2;
  ctx.save();
  if(selected){ctx.shadowColor=color;ctx.shadowBlur=15;}
  // Diamond shape
  ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r,cy);ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r,cy);ctx.closePath();
  const grad=ctx.createRadialGradient(cx-r*.3,cy-r*.3,1,cx,cy,r);
  grad.addColorStop(0,'#fff');grad.addColorStop(.3,color);grad.addColorStop(1,shadeColor(color,-40));
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle=selected?'#fff':shadeColor(color,20);ctx.lineWidth=selected?2:1;ctx.stroke();
  ctx.restore();
}

function shadeColor(hex,amt){
  let n=parseInt(hex.slice(1),16);
  let r=Math.max(0,Math.min(255,((n>>16)&0xff)+amt));
  let g=Math.max(0,Math.min(255,((n>>8)&0xff)+amt));
  let b=Math.max(0,Math.min(255,(n&0xff)+amt));
  return`#${((r<<16)|(g<<8)|b).toString(16).padStart(6,'0')}`;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0d0d14';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const x=c*SZ,y=r*SZ;
    ctx.fillStyle=(r+c)%2===0?'#1e1e30':'#222238';ctx.fillRect(x,y,SZ,SZ);
    if(grid[r][c]!==-1)drawGem(ctx,x,y,GEM_COLORS[grid[r][c]],selected&&selected[0]===r&&selected[1]===c);
  }
}

function findMatches(){
  const matches=new Set();
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-2;c++){
    if(grid[r][c]!==-1&&grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2]){
      let e=c+2;while(e+1<COLS&&grid[r][e+1]===grid[r][c])e++;
      for(let k=c;k<=e;k++)matches.add(r*COLS+k);
    }
  }
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS-2;r++){
    if(grid[r][c]!==-1&&grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c]){
      let e=r+2;while(e+1<ROWS&&grid[e+1][c]===grid[r][c])e++;
      for(let k=r;k<=e;k++)matches.add(k*COLS+c);
    }
  }
  return [...matches].map(i=>[Math.floor(i/COLS),i%COLS]);
}

function clearMatches(matches){
  const pts=matches.length*10*chain;
  score+=pts;chain++;
  matches.forEach(([r,c])=>grid[r][c]=-1);
  return pts;
}

function dropGems(){
  let moved=false;
  for(let c=0;c<COLS;c++){
    for(let r=ROWS-1;r>0;r--){
      if(grid[r][c]===-1){
        for(let k=r-1;k>=0;k--){if(grid[k][c]!==-1){grid[r][c]=grid[k][c];grid[k][c]=-1;moved=true;break;}}
      }
    }
    for(let r=0;r<ROWS;r++)if(grid[r][c]===-1){grid[r][c]=randGem();moved=true;}
  }
  return moved;
}

async function processMatches(){
  animating=true;
  let m=findMatches();
  while(m.length>0){
    clearMatches(m);draw();updateUI();
    await sleep(300);
    dropGems();draw();
    await sleep(200);
    m=findMatches();
  }
  chain=1;updateUI();animating=false;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function swap(r1,c1,r2,c2){
  [grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];
}

canvas.addEventListener('click',async e=>{
  if(animating)return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const c=Math.floor(mx/SZ*(COLS/canvas.width*canvas.getBoundingClientRect().width/canvas.getBoundingClientRect().width));
  const r=Math.floor(my/SZ*(ROWS/canvas.height*canvas.getBoundingClientRect().height/canvas.getBoundingClientRect().height));
  const gc=Math.floor((e.clientX-rect.left)/(rect.width/COLS));
  const gr=Math.floor((e.clientY-rect.top)/(rect.height/ROWS));
  if(gr<0||gr>=ROWS||gc<0||gc>=COLS)return;
  if(!selected){selected=[gr,gc];draw();return;}
  const [sr,sc]=selected;
  if(sr===gr&&sc===gc){selected=null;draw();return;}
  const adj=(Math.abs(sr-gr)===1&&sc===gc)||(Math.abs(sc-gc)===1&&sr===gr);
  if(!adj){selected=[gr,gc];draw();return;}
  swap(sr,sc,gr,gc);
  const m=findMatches();
  if(m.length===0){swap(sr,sc,gr,gc);document.getElementById('status').textContent='No match there! Try again.';selected=null;draw();return;}
  selected=null;
  if(mode==='move'){limit--;if(limit<=0){draw();await processMatches();endGame();return;}}
  draw();document.getElementById('status').textContent='Match!';
  await processMatches();
  updateUI();
  if(mode==='move'&&limit<=0)endGame();
});

function endGame(){
  clearInterval(timer);animating=true;
  if(score>hiScore){hiScore=score;try{localStorage.setItem('gemswap_hi',hiScore);}catch(e){}document.getElementById('hiBadge').textContent='Best: '+hiScore;}
  document.getElementById('status').textContent=`Game Over! Score: ${score}${score>=hiScore?' 🏆 New High Score!':''}`;
  draw();
}

newGame();
</script>
</body>
</html>
