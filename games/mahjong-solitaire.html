<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahjong Solitaire – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
#topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:10px 16px;display:flex;align-items:center;gap:12px;width:100%}
#topbar a{color:#9898b8;text-decoration:none;font-size:20px}
#topbar a:hover{color:#6c63ff}
#topbar .title{flex:1;font-size:18px;font-weight:bold}
.badge{background:#6c63ff;padding:4px 12px;border-radius:12px;font-size:13px;font-weight:bold}
#info-bar{display:flex;gap:12px;padding:8px 16px;flex-wrap:wrap;align-items:center;width:100%;justify-content:center}
.info-chip{background:#1e1e30;border:1px solid #2a2a45;padding:5px 14px;border-radius:8px;font-size:13px}
#board-wrap{overflow-x:auto;padding:10px;width:100%}
canvas{cursor:pointer;display:block;margin:0 auto;touch-action:none;border-radius:8px}
#btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:10px}
button{background:#1e1e30;border:1px solid #2a2a45;color:#e8e8f0;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
button:hover{background:#2a2a45;border-color:#6c63ff}
#overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e1e30;border:2px solid #6c63ff;padding:30px 50px;border-radius:16px;text-align:center;display:none;z-index:100;font-size:20px}
#overlay button{margin-top:14px;background:#6c63ff;border:none;color:#fff;padding:10px 28px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div id="topbar">
  <a href="../index.html">&#8592;</a>
  <span class="title">&#127183; Mahjong Solitaire</span>
  <span class="badge" id="badge">72 tiles</span>
</div>
<div id="info-bar">
  <span class="info-chip">Tiles: <b id="tile-count">72</b></span>
  <span class="info-chip">Time: <b id="timer">0:00</b></span>
  <span class="info-chip" id="hint-chip" style="color:#9898b8">Select a free tile</span>
</div>
<div id="board-wrap"><canvas id="c"></canvas></div>
<div id="btns">
  <button onclick="showHint()">Hint</button>
  <button onclick="shuffleRemaining()">Shuffle</button>
  <button onclick="newGame()">New Game</button>
</div>
<div id="overlay"><div id="ovtext"></div><button onclick="newGame();document.getElementById('overlay').style.display='none'">Play Again</button></div>
<script>
const C=document.getElementById('c');
const ctx=C.getContext('2d');

// Tile types: 4 suits x 9 ranks = 36 types, each appears twice = 72 tiles
// Suits: bamboo(B), circles(C), characters(X), plus 4 winds(W)
// Actually: 4 suits x 9 = 36 types * 2 = 72. But we also want winds.
// Simplified: 8 number types (1-9 in bamboo+circles = 18 types) + 9 characters + 4 winds = nope
// Simple: 4 groups of 9 = 36 types each x2 = 72 tiles
const SUIT_SYMBOLS=['🎋','⭕','㊈','🧭'];
const SUIT_NAMES=['Bamboo','Circles','Characters','Wind'];
// For winds: E S W N
const WIND_CHARS=['東','南','西','北'];
// Characters 1-9: just use numbers with label
const CHAR_NUMS=['一','二','三','四','五','六','七','八','九'];

// Build 36 unique types: suits 0,1,2 have ranks 1-9, suit 3 has ranks 1-4 (winds)
// Actually: 9+9+9+4=31 types, pairs = 62 tiles. Let's use 9+9+9+9=36, 4 suits x 9
// For winds: just repeat W1-W4 twice each, use 5 extra tiles as bonus pairs from suit 0
// SIMPLEST: 36 types * 2 = 72 tiles. Types: suit 0-3, rank 0-8
function makeTileTypes(){
  const types=[];
  for(let s=0;s<4;s++)for(let r=0;r<9;r++)types.push({suit:s,rank:r});
  return types;
}

function tileLabel(suit,rank){
  if(suit===3)return WIND_CHARS[rank%4]; // wind cycles
  if(suit===2)return CHAR_NUMS[rank];
  if(suit===1)return (rank+1)+'';
  return (rank+1)+'';
}
function tileSuitIcon(suit){
  if(suit===0)return '🎋';
  if(suit===1)return '⭕';
  if(suit===2)return '漢';
  return '🧭';
}

const COLS=9,ROWS=4;
let TW,TH,COLS_N=COLS,ROWS_N=ROWS;

function calcSize(){
  const maxW=Math.min(window.innerWidth-16,700);
  TW=Math.floor(maxW/(COLS+1));TH=Math.floor(TW*1.3);
  C.width=(COLS+0.5)*TW;C.height=ROWS*TH+20;
}

let tiles,selected,removed,tilesLeft,timer,elapsed,hintPair;

function newGame(){
  clearInterval(timer);elapsed=0;
  const types=makeTileTypes();
  // Create 72 tiles: each type appears twice
  const tilePool=[];
  types.forEach(t=>{tilePool.push({...t});tilePool.push({...t});});
  // Shuffle
  for(let i=tilePool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tilePool[i],tilePool[j]]=[tilePool[j],tilePool[i]];}
  // Place on board: ROWS x COLS grid
  tiles=[];
  let idx=0;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(idx>=tilePool.length)break;
      tiles.push({row:r,col:c,layer:0,...tilePool[idx],removed:false,id:idx});
      idx++;
    }
    if(idx>=tilePool.length)break;
  }
  // Extra tiles: stack some on top (layer 1) for pyramid feel - stagger
  // Simple 2-layer: lay remaining tiles on rows 1-2 centered
  if(idx<tilePool.length){
    for(let r=1;r<3;r++){
      for(let c=1;c<COLS-1;c++){
        if(idx>=tilePool.length)break;
        // only place if there's a tile below in all 4 corners
        tiles.push({row:r,col:c,layer:1,...tilePool[idx],removed:false,id:idx});
        idx++;
      }
    }
  }
  selected=null;removed=0;hintPair=null;
  tilesLeft=tiles.length;
  document.getElementById('overlay').style.display='none';
  document.getElementById('tile-count').textContent=tilesLeft;
  document.getElementById('hint-chip').textContent='Select a free tile';
  document.getElementById('badge').textContent=tilesLeft+' tiles';
  timer=setInterval(()=>{elapsed++;updateTimer();},1000);
  draw();
}

function updateTimer(){
  const m=Math.floor(elapsed/60),s=elapsed%60;
  document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;
}

function isFree(t){
  if(t.removed)return false;
  // Not blocked on left and right
  const blockedLeft=tiles.some(o=>!o.removed&&o.layer===t.layer&&o.col===t.col-1&&o.row===t.row);
  const blockedRight=tiles.some(o=>!o.removed&&o.layer===t.layer&&o.col===t.col+1&&o.row===t.row);
  if(blockedLeft&&blockedRight)return false;
  // Not covered on top (layer above)
  const covered=tiles.some(o=>!o.removed&&o.layer>t.layer&&o.col===t.col&&o.row===t.row);
  return !covered;
}

function tilesMatch(a,b){
  return a.suit===b.suit&&a.rank===b.rank&&a.id!==b.id;
}

function findFreePairs(){
  const free=tiles.filter(t=>!t.removed&&isFree(t));
  const pairs=[];
  for(let i=0;i<free.length;i++)for(let j=i+1;j<free.length;j++)
    if(tilesMatch(free[i],free[j]))pairs.push([free[i],free[j]]);
  return pairs;
}

function draw(){
  calcSize();
  ctx.fillStyle='#0d0d14';ctx.fillRect(0,0,C.width,C.height);
  // Draw tiles layer by layer
  const layers=[0,1,2].map(l=>tiles.filter(t=>!t.removed&&t.layer===l));
  [0,1].forEach(layer=>{
    layers[layer].forEach(t=>drawTile(t));
  });
}

function tileX(t){return t.col*TW+(t.layer*3);}
function tileY(t){return t.row*TH+(t.layer*-3)+10;}

function drawTile(t){
  const x=tileX(t),y=tileY(t),w=TW-2,h=TH-2;
  const free=isFree(t);
  const sel=selected&&selected.id===t.id;
  const hint=hintPair&&hintPair.some(p=>p.id===t.id);
  // shadow
  ctx.fillStyle='#050508';
  roundRect(x+3,y+3,w,h,5);ctx.fill();
  // tile face
  ctx.fillStyle=sel?'#3a3a6a':hint?'#3a5a3a':free?'#e8e8f0':'#c0c0c8';
  roundRect(x,y,w,h,5);ctx.fill();
  ctx.strokeStyle=sel?'#6c63ff':hint?'#2ecc71':'#aaa';ctx.lineWidth=sel?2:1;ctx.stroke();
  // content
  const suit=t.suit,rank=t.rank;
  ctx.textAlign='center';ctx.textBaseline='middle';
  // suit color
  const colors=['#2ecc71','#e74c3c','#3498db','#f39c12'];
  ctx.fillStyle=sel||hint?'#e8e8f0':free?colors[suit]:'#9898b8';
  ctx.font=`bold ${Math.floor(h*0.35)}px Arial`;
  ctx.fillText(tileSuitIcon(suit),x+w/2,y+h*0.32);
  ctx.font=`bold ${Math.floor(h*0.28)}px Arial`;
  ctx.fillStyle=sel||hint?'#e8e8f0':free?'#1a1a1a':'#9898b8';
  ctx.fillText(tileLabel(suit,rank),x+w/2,y+h*0.68);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

C.addEventListener('click',e=>{
  const rect=C.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  // Find clicked tile (topmost layer first)
  let hit=null;
  for(let layer=1;layer>=0;layer--){
    for(const t of tiles){
      if(t.removed||t.layer!==layer)continue;
      const x=tileX(t),y=tileY(t),w=TW-2,h=TH-2;
      if(mx>=x&&mx<=x+w&&my>=y&&my<=y+h){hit=t;break;}
    }
    if(hit)break;
  }
  if(!hit)return;
  if(!isFree(hit)){
    document.getElementById('hint-chip').textContent='That tile is blocked!';
    return;
  }
  hintPair=null;
  if(!selected){
    selected=hit;
    document.getElementById('hint-chip').textContent='Now select a matching tile';
  }else if(selected.id===hit.id){
    selected=null;
    document.getElementById('hint-chip').textContent='Select a free tile';
  }else if(tilesMatch(selected,hit)){
    selected.removed=true;hit.removed=true;
    selected=null;tilesLeft-=2;
    document.getElementById('tile-count').textContent=tilesLeft;
    document.getElementById('badge').textContent=tilesLeft+' tiles';
    document.getElementById('hint-chip').textContent='Match! Keep going!';
    if(tilesLeft===0){clearInterval(timer);document.getElementById('ovtext').textContent='You Win! All tiles cleared!';document.getElementById('overlay').style.display='block';}
    else if(!findFreePairs().length){document.getElementById('hint-chip').textContent='No more moves! Try Shuffle.';}
  }else{
    selected=hit;
    document.getElementById('hint-chip').textContent='No match — try another tile';
  }
  draw();
});

function showHint(){
  const pairs=findFreePairs();
  if(!pairs.length){document.getElementById('hint-chip').textContent='No moves available — try Shuffle';return;}
  hintPair=pairs[0];selected=null;
  document.getElementById('hint-chip').textContent='Hint: highlighted pair matches!';
  draw();
}

function shuffleRemaining(){
  const remaining=tiles.filter(t=>!t.removed);
  // collect their type data, shuffle, reassign
  const typeData=remaining.map(t=>({suit:t.suit,rank:t.rank}));
  for(let i=typeData.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[typeData[i],typeData[j]]=[typeData[j],typeData[i]];}
  remaining.forEach((t,i)=>{t.suit=typeData[i].suit;t.rank=typeData[i].rank;});
  selected=null;hintPair=null;
  document.getElementById('hint-chip').textContent='Shuffled! Select a free tile';
  draw();
}

window.addEventListener('resize',()=>{calcSize();draw();});
calcSize();newGame();
</script>
</body>
</html>
