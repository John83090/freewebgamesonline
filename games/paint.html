<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Paint – FreeWebGamesOnline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#e8e8f0;font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#1e1e30;border-bottom:1px solid #2a2a45;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar a{color:#9898b8;text-decoration:none;font-size:20px}
.topbar a:hover{color:#6c63ff}
.topbar h1{font-size:16px;font-weight:600;flex:1}
.main{display:flex;flex:1;overflow:hidden}
.toolbar{background:#1e1e30;border-right:1px solid #2a2a45;padding:10px 8px;display:flex;flex-direction:column;gap:8px;width:52px;align-items:center;overflow-y:auto;flex-shrink:0}
.tool-btn{width:36px;height:36px;border:2px solid #2a2a45;border-radius:8px;background:#0d0d14;color:#e8e8f0;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.tool-btn:hover,.tool-btn.active{border-color:#6c63ff;background:#2a2a45}
.sep{width:36px;height:1px;background:#2a2a45}
.canvas-wrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:flex-start;padding:12px}
canvas{border:1px solid #2a2a45;cursor:crosshair;touch-action:none;display:block}
.panel{background:#1e1e30;border-left:1px solid #2a2a45;padding:10px 8px;width:54px;display:flex;flex-direction:column;gap:6px;align-items:center;overflow-y:auto;flex-shrink:0}
.color-swatch{width:28px;height:28px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:border-color .2s}
.color-swatch.active{border-color:#e8e8f0}
.color-swatch:hover{border-color:#9898b8}
.size-btn{width:36px;height:28px;border:2px solid #2a2a45;border-radius:6px;background:#0d0d14;color:#e8e8f0;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.size-btn.active{border-color:#6c63ff}
.action-btn{width:36px;height:28px;border:1px solid #2a2a45;border-radius:6px;background:#0d0d14;color:#9898b8;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.action-btn:hover{background:#2a2a45;color:#e8e8f0}
.stamp-row{display:flex;flex-direction:column;gap:4px;align-items:center}
.stamp-btn{font-size:20px;cursor:pointer;padding:2px;border-radius:4px}
.stamp-btn:hover{background:#2a2a45}
label.sec{font-size:9px;color:#9898b8;text-align:center;line-height:1.2}
</style>
</head>
<body>
<div class="topbar">
  <a href="../index.html">&#8592;</a>
  <h1>🎨 Digital Paint</h1>
</div>
<div class="main">
  <div class="toolbar">
    <button class="tool-btn active" id="t-pencil" onclick="setTool('pencil')" title="Pencil">✏️</button>
    <button class="tool-btn" id="t-eraser" onclick="setTool('eraser')" title="Eraser">🧹</button>
    <button class="tool-btn" id="t-fill" onclick="setTool('fill')" title="Fill">🪣</button>
    <button class="tool-btn" id="t-line" onclick="setTool('line')" title="Line">╱</button>
    <button class="tool-btn" id="t-rect" onclick="setTool('rect')" title="Rectangle">⬜</button>
    <button class="tool-btn" id="t-circle" onclick="setTool('circle')" title="Circle">⭕</button>
    <button class="tool-btn" id="t-stamp" onclick="setTool('stamp')" title="Stamp">🌟</button>
    <div class="sep"></div>
    <button class="tool-btn" onclick="undo()" title="Undo">↩️</button>
    <button class="tool-btn" onclick="clearCanvas()" title="Clear">🗑️</button>
    <button class="tool-btn" onclick="saveImg()" title="Save">💾</button>
  </div>
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="c" width="800" height="560"></canvas>
  </div>
  <div class="panel">
    <label class="sec">Colors</label>
    <div id="palette"></div>
    <div class="sep" style="width:36px;margin:2px 0"></div>
    <label class="sec">Size</label>
    <button class="size-btn active" id="s3" onclick="setSize(3)">3</button>
    <button class="size-btn" id="s8" onclick="setSize(8)">8</button>
    <button class="size-btn" id="s16" onclick="setSize(16)">16</button>
    <button class="size-btn" id="s32" onclick="setSize(32)">32</button>
    <div class="sep" style="width:36px;margin:2px 0"></div>
    <label class="sec">Stamps</label>
    <div class="stamp-row" id="stamp-row"></div>
  </div>
</div>
<script>
const PALETTE=['#e8e8f0','#0d0d14','#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#845ec2'];
const STAMPS=['🌟','🎈','🦋','🌈','❤️','🌸','⭐','🐱','🦄','🎉'];
let tool='pencil',color='#e74c3c',size=3,drawing=false,snap=null,lastX=0,lastY=0;
let history=[],undoStack=[];
let selectedStamp=STAMPS[0];
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);

const palette=document.getElementById('palette');
PALETTE.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='color-swatch'+(i===2?' active':'');
  d.style.background=c;d.title=c;
  d.onclick=()=>{
    color=c;
    document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
    d.classList.add('active');
  };
  palette.appendChild(d);
});

const stampRow=document.getElementById('stamp-row');
STAMPS.forEach((s,i)=>{
  const b=document.createElement('div');
  b.className='stamp-btn'+(i===0?' active':'');
  b.textContent=s;
  b.onclick=()=>{
    selectedStamp=s;
    document.querySelectorAll('.stamp-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    setTool('stamp');
  };
  stampRow.appendChild(b);
});

function setTool(t){
  tool=t;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('t-'+t);
  if(el)el.classList.add('active');
}
function setSize(s){
  size=s;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('s'+s).classList.add('active');
}
function saveState(){
  undoStack.push(ctx.getImageData(0,0,canvas.width,canvas.height));
  if(undoStack.length>10)undoStack.shift();
}
function undo(){
  if(undoStack.length===0)return;
  ctx.putImageData(undoStack.pop(),0,0);
}
function clearCanvas(){
  saveState();ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
}
function saveImg(){
  const a=document.createElement('a');a.download='painting.png';a.href=canvas.toDataURL();a.click();
}
function getPos(e){
  const r=canvas.getBoundingClientRect();
  const scX=canvas.width/r.width,scY=canvas.height/r.height;
  if(e.touches){
    return{x:(e.touches[0].clientX-r.left)*scX,y:(e.touches[0].clientY-r.top)*scY};
  }
  return{x:(e.clientX-r.left)*scX,y:(e.clientY-r.top)*scY};
}
function floodFill(sx,sy,fillColor){
  const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=imgData.data;
  const w=canvas.width,h=canvas.height;
  const idx=(x,y)=>(y*w+x)*4;
  const i=idx(Math.round(sx),Math.round(sy));
  const tr=[d[i],d[i+1],d[i+2],d[i+3]];
  const fc=hexToRgb(fillColor);
  if(tr[0]===fc.r&&tr[1]===fc.g&&tr[2]===fc.b)return;
  const stack=[[Math.round(sx),Math.round(sy)]];
  while(stack.length){
    const [x,y]=stack.pop();
    if(x<0||x>=w||y<0||y>=h)continue;
    const ii=idx(x,y);
    if(d[ii]!==tr[0]||d[ii+1]!==tr[1]||d[ii+2]!==tr[2])continue;
    d[ii]=fc.r;d[ii+1]=fc.g;d[ii+2]=fc.b;d[ii+3]=255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imgData,0,0);
}
function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return{r,g,b};
}
canvas.addEventListener('mousedown',startDraw);
canvas.addEventListener('mousemove',moveDraw);
canvas.addEventListener('mouseup',endDraw);
canvas.addEventListener('mouseleave',endDraw);
canvas.addEventListener('touchstart',e=>{e.preventDefault();startDraw(e);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();moveDraw(e);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();endDraw(e);},{passive:false});

function startDraw(e){
  const p=getPos(e);
  if(tool==='fill'){saveState();floodFill(p.x,p.y,color);return;}
  if(tool==='stamp'){
    saveState();
    ctx.font=`${size*4+20}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(selectedStamp,p.x,p.y);
    return;
  }
  drawing=true;lastX=p.x;lastY=p.y;
  if(tool==='line'||tool==='rect'||tool==='circle'){
    snap=ctx.getImageData(0,0,canvas.width,canvas.height);
  } else {
    saveState();
    ctx.beginPath();ctx.moveTo(p.x,p.y);
    ctx.strokeStyle=tool==='eraser'?'#ffffff':color;
    ctx.lineWidth=size;ctx.lineCap='round';ctx.lineJoin='round';
  }
}
function moveDraw(e){
  if(!drawing)return;
  const p=getPos(e);
  if(tool==='pencil'||tool==='eraser'){
    ctx.lineTo(p.x,p.y);ctx.stroke();
  } else if(tool==='line'||tool==='rect'||tool==='circle'){
    ctx.putImageData(snap,0,0);
    ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';
    ctx.beginPath();
    if(tool==='line'){ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);}
    else if(tool==='rect'){ctx.strokeRect(lastX,lastY,p.x-lastX,p.y-lastY);}
    else{const rx=Math.abs(p.x-lastX)/2,ry=Math.abs(p.y-lastY)/2,cx=(lastX+p.x)/2,cy=(lastY+p.y)/2;ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);}
    ctx.stroke();
  }
}
function endDraw(e){
  if(!drawing)return;
  drawing=false;
  if(tool==='line'||tool==='rect'||tool==='circle'){
    saveState();snap=null;
  }
}
</script>
</body>
</html>
